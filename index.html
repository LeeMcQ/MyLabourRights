/* ===== app.js ===== */

/* ============================================================
   MyLabourRights — South African Labour Law Platform
   Single-file frontend prototype. Storage: IndexedDB.
   AI layer: simulated dual-engine (Gemini + Claude synthesis).
   Backend integration points are marked: // PHASE-2
   ============================================================ */

'use strict';

/* ============================================================
   SECTION 1 — INDEXEDDB LAYER
   Schema is the FIXED CONTRACT all UI sections depend on.
   Stores: users, cases, documents, messages, timeline, meta
   ============================================================ */
const DB = (() => {
  const NAME = 'mlr-db', VERSION = 3;
  let db = null;

  function open() {
    return new Promise((resolve, reject) => {
      if (db) return resolve(db);
      const req = indexedDB.open(NAME, VERSION);
      req.onupgradeneeded = (e) => {
        const d = e.target.result;
        if (!d.objectStoreNames.contains('users'))
          d.createObjectStore('users', { keyPath: 'id' });
        if (!d.objectStoreNames.contains('cases')) {
          const s = d.createObjectStore('cases', { keyPath: 'id' });
          s.createIndex('userId', 'userId', { unique: false });
        }
        if (!d.objectStoreNames.contains('documents')) {
          const s = d.createObjectStore('documents', { keyPath: 'id' });
          s.createIndex('caseId', 'caseId', { unique: false });
        }
        if (!d.objectStoreNames.contains('messages')) {
          const s = d.createObjectStore('messages', { keyPath: 'id' });
          s.createIndex('caseId', 'caseId', { unique: false });
        }
        if (!d.objectStoreNames.contains('timeline')) {
          const s = d.createObjectStore('timeline', { keyPath: 'id' });
          s.createIndex('caseId', 'caseId', { unique: false });
        }
        if (!d.objectStoreNames.contains('notes')) {
          const s = d.createObjectStore('notes', { keyPath: 'id' });
          s.createIndex('caseId', 'caseId', { unique: false });
        }
        if (!d.objectStoreNames.contains('meta'))
          d.createObjectStore('meta', { keyPath: 'key' });
      };
      req.onsuccess = () => { db = req.result; resolve(db); };
      req.onerror = () => reject(req.error);
    });
  }

  async function tx(store, mode = 'readonly') {
    const d = await open();
    return d.transaction(store, mode).objectStore(store);
  }

  const put = async (store, val) => {
    const s = await tx(store, 'readwrite');
    return new Promise((res, rej) => {
      const r = s.put(val); r.onsuccess = () => res(val); r.onerror = () => rej(r.error);
    });
  };
  // F1 — ask the browser to keep this data (don't evict under storage pressure)
  async function persist() {
    try {
      if (navigator.storage && navigator.storage.persist) {
        const already = navigator.storage.persisted ? await navigator.storage.persisted() : false;
        if (already) return true;
        return await navigator.storage.persist();
      }
    } catch {}
    return false;
  }
  // F2/F3 — current usage vs quota (0..1), for warnings and size guards
  async function usage() {
    try {
      if (navigator.storage && navigator.storage.estimate) {
        const e = await navigator.storage.estimate();
        return { usage: e.usage || 0, quota: e.quota || 0,
          ratio: e.quota ? (e.usage || 0) / e.quota : 0 };
      }
    } catch {}
    return { usage: 0, quota: 0, ratio: 0 };
  }
  const get = async (store, key) => {
    const s = await tx(store);
    return new Promise((res, rej) => {
      const r = s.get(key); r.onsuccess = () => res(r.result); r.onerror = () => rej(r.error);
    });
  };
  const all = async (store) => {
    const s = await tx(store);
    return new Promise((res, rej) => {
      const r = s.getAll(); r.onsuccess = () => res(r.result || []); r.onerror = () => rej(r.error);
    });
  };
  const byIndex = async (store, index, value) => {
    const s = await tx(store);
    return new Promise((res, rej) => {
      const r = s.index(index).getAll(value);
      r.onsuccess = () => res(r.result || []); r.onerror = () => rej(r.error);
    });
  };
  const del = async (store, key) => {
    const s = await tx(store, 'readwrite');
    return new Promise((res, rej) => {
      const r = s.delete(key); r.onsuccess = () => res(); r.onerror = () => rej(r.error);
    });
  };

  return { open, put, get, all, byIndex, del, persist, usage };
})();

// F2 — a write that never fails silently. On error it checks storage and tells
// the user, then rethrows so the caller can stop instead of pretending it saved.
async function safeWrite(store, val, label) {
  try {
    return await DB.put(store, val);
  } catch (err) {
    let msg = 'Couldn\u2019t save' + (label ? ' ' + label : '') + '. ';
    try {
      const u = await DB.usage();
      msg += (u.ratio > 0.85)
        ? 'Your device looks low on storage \u2014 free some space and try again.'
        : 'Please try again.';
    } catch { msg += 'Please try again.'; }
    if (typeof toast === 'function') toast(msg, 'alert');
    throw err;
  }
}
const $ = (sel, root = document) => root.querySelector(sel);
const $$ = (sel, root = document) => [...root.querySelectorAll(sel)];
const esc = (s) => String(s ?? '').replace(/[&<>"]/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c]));
const fmtDate = (ts) => new Date(ts).toLocaleDateString('en-ZA', { day: 'numeric', month: 'short', year: 'numeric' });
const todayKey = () => new Date().toISOString().slice(0, 10);

function toast(msg, icon = 'check') {
  const zone = $('#toastZone');
  const el = document.createElement('div');
  el.className = 'toast';
  el.innerHTML = `${ICONS[icon] || ICONS.check}<span>${esc(msg)}</span>`;
  zone.appendChild(el);
  setTimeout(() => { el.style.opacity = '0'; el.style.transition = 'opacity .3s'; }, 3200);
  setTimeout(() => el.remove(), 3600);
}

/* ============================================================

   A short, guided rule-based classifier. Returns the dispute key
   used by the deadline engine and forum router. Deliberately
   transparent (not a black box) so users understand the routing.
   ============================================================ */
const DISPUTE_TYPES = {
  unfair_dismissal:       { key:'unfair_dismissal',       label:'Unfair dismissal',          label_af:'Onbillike ontslag' },
  constructive_dismissal: { key:'constructive_dismissal', label:'Constructive dismissal',     label_af:'Konstruktiewe ontslag' },
  retrenchment_operational:{ key:'retrenchment_operational',label:'Retrenchment',             label_af:'Aflegging' },
  unfair_labour_practice: { key:'unfair_labour_practice', label:'Unfair labour practice',    label_af:'Onbillike arbeidspraktyk' },
  unfair_discrimination:  { key:'unfair_discrimination',  label:'Unfair discrimination',     label_af:'Onbillike diskriminasie' },
  bcea_money_claim:       { key:'bcea_money_claim',       label:'Money owed (BCEA)',         label_af:'Geld verskuldig (BCEA)' },
  nmw_underpayment:       { key:'nmw_underpayment',       label:'Minimum-wage underpayment', label_af:'Minimumloon-onderbetaling' },
};

/* The guided questions shown in the classifier wizard (S2). */
const CLASSIFIER_QUESTIONS = [
  {
    id: 'category',
    q: 'What best describes what happened?',
    q_af: 'Wat beskryf die beste wat gebeur het?',
    options: [
      { v: 'dismissed',     t: 'I was dismissed / fired / retrenched' },
      { v: 'treated',       t: 'I was treated unfairly at work (not dismissed)' },
      { v: 'discriminated', t: 'I was discriminated against or harassed' },
      { v: 'money',         t: 'I am owed money, leave or notice pay' },
      { v: 'wage',          t: 'I am paid below the minimum wage' },
    ],
  },
];

/* Map a classifier answer (or free text) to a dispute type. */
function classifyDispute(answer, freeText) {
  const a = (answer || '').toLowerCase();
  const t = (freeText || '').toLowerCase();
  // E2 — constructive dismissal: resigned because conditions were made intolerable
  if (a === 'constructive_dismissal' || /\b(forced to resign|had no choice|made me resign|constructive|intolerable|couldn.?t stay|forced out)/.test(t))
    return 'constructive_dismissal';
  // E2 — retrenchment / operational requirements (check before generic dismissal)
  if (a === 'retrenchment_operational' || /\b(retrench|s189|section 189|operational requirement|restructur|redundan|aflegging)/.test(t))
    return 'retrenchment_operational';
  if (a === 'dismissed' || /\b(dismiss|fired|terminat|let go|afgedank)/.test(t))
    return 'unfair_dismissal';
  if (a === 'discriminated' || /\b(discriminat|harass|victimi|race|gender|pregnan|disab)/.test(t))
    return 'unfair_discrimination';
  if (a === 'wage' || /\b(minimum wage|below.*wage|underpaid|minimumloon)/.test(t))
    return 'nmw_underpayment';
  if (a === 'money' || /\b(owed|unpaid|leave pay|notice pay|salary|severance)/.test(t))
    return 'bcea_money_claim';
  if (a === 'treated' || /\b(unfair|suspend|demot|transfer|warning|grievance)/.test(t))
    return 'unfair_labour_practice';
  return null;
}

/* ============================================================
   SECTION 4d — DEADLINE ENGINE  (S1)
   Given a dispute type and an incident date, compute the referral
   deadline, days remaining, and whether condonation is likely needed.
   ============================================================ */
const Deadline = {
  compute(disputeKey, incidentDateISO) {
    const d = LEGAL_FACTS.deadlines[disputeKey];
    if (!d || !incidentDateISO) return null;
    const incident = new Date(incidentDateISO + 'T00:00:00');
    if (isNaN(incident)) return null;
    const deadline = new Date(incident.getTime() + d.days * 86400000);
    const now = new Date(); now.setHours(0, 0, 0, 0);
    const msLeft = deadline - now;
    const daysLeft = Math.ceil(msLeft / 86400000);
    return {
      disputeKey,
      label: d.label,
      basis: d.basis,
      windowDays: d.days,
      incidentDate: incidentDateISO,
      deadlineDate: deadline.toISOString().slice(0, 10),
      daysLeft,
      status: daysLeft < 0 ? 'missed' : daysLeft <= 5 ? 'urgent' : daysLeft <= 14 ? 'soon' : 'ok',
      condonationNeeded: daysLeft < 0,
    };
  },
  /* which forum the matter goes to after conciliation (S3 groundwork) */
  forum(disputeKey) {
    if (disputeKey === 'unfair_discrimination')
      return 'CCMA conciliation → then Labour Court (or CCMA arbitration if you earn under the BCEA threshold and consent)';
    if (disputeKey === 'bcea_money_claim' || disputeKey === 'nmw_underpayment')
      return 'CCMA / Department of Employment & Labour (BCEA enforcement)';
    return 'CCMA conciliation → then CCMA arbitration if unresolved';
  },
  /* S3: structured forum path — ordered steps for the visual router */
  forumPath(disputeKey) {
    const common = (last) => ([
      { label: 'Refer to the CCMA', detail: 'Lodge LRA Form 7.11 within your deadline.', icon: 'send' },
      { label: 'Conciliation', detail: 'A settlement-focused meeting. No lawyers at this stage.', icon: 'chat' },
      last,
    ]);
    if (disputeKey === 'unfair_discrimination') {
      return common({
        label: 'Labour Court (or CCMA arbitration)',
        detail: 'If unresolved, discrimination disputes usually go to the Labour Court — or to CCMA arbitration if you earn under the BCEA threshold and both sides consent.',
        icon: 'building',
      });
    }
    if (disputeKey === 'bcea_money_claim' || disputeKey === 'nmw_underpayment') {
      return [
        { label: 'CCMA / DEL claim', detail: 'Money and minimum-wage claims are enforced through the CCMA or the Department of Employment & Labour.', icon: 'send' },
        { label: 'Assessment', detail: 'The amount owed is assessed against your payslips and contract.', icon: 'doc' },
        { label: 'Compliance order / arbitration', detail: 'An order to pay can be issued and enforced.', icon: 'scale' },
      ];
    }
    return common({
      label: 'CCMA arbitration',
      detail: 'If conciliation fails, an arbitrator hears evidence and issues a binding award (request within 90 days).',
      icon: 'scale',
    });
  },
};

const Citation = {
  /* Build a 3-layer citation set for a topic/dispute. */
  build(disputeKey, docCount, answered) {
    const law = (CITATIONS[disputeKey] || CITATIONS.general).slice(0, 3);
    // confidence layer — heuristic, never overclaimed
    let confidence = 'fact-sensitive';
    if ((answered || 0) >= 3 && (docCount || 0) >= 2) confidence = 'reasonably grounded';
    if ((answered || 0) < 1) confidence = 'preliminary — needs more facts';
    return {
      law,
      record: (docCount || 0) > 0
        ? `${docCount} document(s) in your file support this assessment.`
        : 'No documents uploaded yet — add evidence to strengthen grounding.',
      confidence,
    };
  },
};

/* ---- S9: mock cross-examination question bank ---- */
const CrossExam = {
  /* Hostile questions targeting the real weak points of CCMA matters. */
  questions(disputeKey, caseObj) {
    const universal = [
      { q: 'You say this happened on a specific date \u2014 what is your proof of that exact date?', attacks: 'date certainty' },
      { q: 'Did you raise this in writing at the time? If not, why not?', attacks: 'contemporaneous record' },
      { q: 'Is there anyone who saw this happen who can confirm your version?', attacks: 'corroboration' },
      { q: 'You\u2019re telling us what you were told by someone else \u2014 isn\u2019t that hearsay?', attacks: 'hearsay' },
    ];
    const byType = {
      unfair_dismissal: [
        { q: 'You were given a notice of a hearing, weren\u2019t you? So how was the process unfair?', attacks: 'procedural fairness' },
        { q: 'Had you been warned about this conduct before? Show us the clean record.', attacks: 'prior warnings' },
      ],
      unfair_labour_practice: [
        { q: 'Other employees were treated the same way, weren\u2019t they? So where is the unfairness?', attacks: 'comparator' },
      ],
      unfair_discrimination: [
        { q: 'What is your direct evidence that the reason was your personal characteristic, rather than performance?', attacks: 'causation' },
      ],
      bcea_money_claim: [
        { q: 'Your payslips show you were paid \u2014 what exactly is the amount you say is outstanding, and how is it calculated?', attacks: 'quantum' },
      ],
    };
    return [...(byType[disputeKey] || []), ...universal];
  },
  /* S10: trauma-informed flag — gentler pacing for sensitive matters */
  isSensitive(disputeKey, caseObj) {
    if (disputeKey === 'unfair_discrimination') return true;
    if (caseObj && /harass|assault|abuse|victimi|threat|intimidat/i.test(
      (caseObj.description || '') + ' ' + (caseObj.name || ''))) return true;
    return false;

};

    if (successRate >= 65) return 'Your estimated prospects are reasonably strong \u2014 you can negotiate from a position of some confidence, but litigation always carries risk and delay.';
    if (successRate >= 45) return 'Your prospects are finely balanced \u2014 a fair settlement now may well beat the uncertainty of arbitration.';
    return 'Your estimated prospects are on the weaker side \u2014 a negotiated exit may protect you better than an all-or-nothing hearing.';
  },

/* ---- S13: structured bundle builder ---- */
const Bundle = {
  /* The standard CCMA-ready file structure from the strategy document. */
  sections(caseObj) {
    const has = {
      intake: (caseObj.messageCount || 0) > 0,
      deadline: !!(caseObj.disputeKey && caseObj.incidentDate),
      outcome: !!caseObj.desiredOutcome,
      issues: !!(caseObj.issueRows && caseObj.issueRows.length),
      evidence: (caseObj.docCount || 0) > 0,
      timeline: !!(caseObj.timelineCount),
      settlement: !!(caseObj.settlementPicked && caseObj.settlementPicked.length),
    };
    return [
      { key: 'intake', label: 'Intake note', detail: 'Your account from the AI interview.', done: has.intake },
      { key: 'deadline', label: 'Forum & deadline note', detail: 'Dispute type, referral deadline and forum.', done: has.deadline },
      { key: 'outcome', label: 'Outcome & objective', detail: 'What you want and your settlement floor.', done: has.outcome },
      { key: 'issues', label: 'Issue matrix', detail: 'Best / worst / disputed facts per allegation.', done: has.issues },
      { key: 'timeline', label: 'Chronology', detail: 'A dated sequence of events.', done: has.timeline },
      { key: 'evidence', label: 'Evidence index', detail: 'Your uploaded documents, prioritised.', done: has.evidence },
      { key: 'settlement', label: 'Settlement brief', detail: 'The value heads you would negotiate.', done: has.settlement },
    ];
  },
  readiness(caseObj) {
    const s = this.sections(caseObj);
    return Math.round(100 * s.filter(x => x.done).length / s.length);
  },
};

    { g: 'A', re: /(contract|kontrak|appointment|offer letter|transfer letter)/i,
      issue: 'Employment terms / benefit entitlement', section: 2 },
    { g: 'A', re: /(polic|handbook|scheme rules|benefit guide)/i,
      issue: 'Policy clause proving the benefit', section: 2 },
    { g: 'A', re: /(refus|decline|denial|instruction|directive|admission|final decision)/i,
      issue: 'Employer decision / refusal / admission', section: 3 },
    { g: 'A', re: /(dismiss|terminat|retrench|afdank|warning|hearing|disciplin|verhoor)/i,
      issue: 'Dismissal / disciplinary fairness', section: 3 },
    { g: 'A', re: /(grievance outcome|appeal outcome|grievance result)/i,
      issue: 'Internal outcome — exhaustion of remedies', section: 4 },
    { g: 'B', re: /(grievance|objection|complaint|appeal)/i,
      issue: 'Employee objection / attempt to resolve', section: 4 },
    { g: 'D', re: /(payslip|salary slip|loonstrokie|deduction|bank statement|invoice|calculat|backpay|medical[\s-]?aid|bestmed|discovery health|momentum health)/i,
      issue: 'Financial loss / remedy quantification', section: 7 },
    { g: 'B', re: /(witness|statement|confirm)/i,
      issue: 'Corroboration / witness confirmation', section: 8 },
    { g: 'E', re: /(screenshot|screen shot|img_|image\d|photo)/i,
      issue: 'Needs authentication — source/metadata', section: 10 },
    { g: 'B', re: /(email|e-mail|whatsapp|wa[\s_]|correspond|letter|brief|follow[\s-]?up)/i,
      issue: 'Chronology / credibility / context', section: 9 },
  ],

  classifyDoc(name) {
    for (const r of this.GROUP_RULES) {
      if (r.re.test(name)) return { group: r.g, issue: r.issue, section: r.section };
    }
    return { group: 'E', issue: 'Issue needs review', section: 10 };
  },

  /* Strength from the document-desk score + group */
  strength(score, group, isDup) {
    if (isDup) return 'Duplicate';
    if (group === 'E') return 'Needs review';
    if (score >= 85) return 'Strong';
    if (score >= 60) return 'Moderate';
    return 'Weak';
  },

  /* Hearsay / witness risk heuristics from the prompt's risk labels */
  witnessRisk(name, group) {
    const n = name.toLowerCase();
    if (group === 'C') return 'No witness needed — procedural document';
    if (/(hr|payroll|finance|management|manager)/.test(n) && /(email|letter|refus|instruction)/.test(n))
      return 'Low risk — possible employer admission';
    if (/(screenshot|photo|img_|image)/.test(n)) return 'Authentication risk — metadata/source needed';
    if (/(witness|statement)/.test(n)) return 'High risk — author should testify';
    if (/(whatsapp|wa[\s_])/.test(n)) return 'Moderate risk — needs context from employee';
    return 'Moderate risk — needs context from employee';
  },

  /* Duplicate detection on normalised name stems */
  normStem(name) {
    return name.toLowerCase()
      .replace(/\.(pdf|jpg|jpeg|png|docx?|txt)$/i, '')
      .replace(/\s*\(\d+\)\s*|\s*-?\s*copy\s*\d*|\s*final|\s*v\d+|\s*\d{1,2}$/gi, '')
      .replace(/[^a-z0-9]+/g, ' ').trim();
  },

  /* MAIN — produce the full organised bundle from the case's documents.
     docs: [{name, score, uploadedAt}] from the document desk. */
  organise(docs, caseObj) {
    const seen = new Map();             // stem -> first (strongest) doc index
    const rows = [];
    // sort by score desc so the strongest of any duplicate pair is kept
    const sorted = [...docs].sort((a, b) => (b.score || 0) - (a.score || 0));
    for (const d of sorted) {
      const cls = this.classifyDoc(d.name);
      const stem = this.normStem(d.name);
      const dupOf = seen.has(stem) ? seen.get(stem) : null;
      if (!dupOf) seen.set(stem, d.name);
      const group = dupOf ? 'E' : cls.group;
      rows.push({
        name: d.name,
        group,
        issue: dupOf ? 'Duplicate / reserve only' : cls.issue,
        section: dupOf ? 10 : cls.section,
        strength: this.strength(d.score || 35, group, !!dupOf),
        risk: this.witnessRisk(d.name, group),
        duplicateOf: dupOf,
        include: dupOf ? 'No — duplicate (stronger version retained)'
          : group === 'E' ? 'Reserve bundle only'
          : 'Yes — main bundle',
        score: d.score || 35,
      });
    }
    // priority numbers within each group, by score
    const counters = {};
    for (const r of rows.sort((a, b) => a.group.localeCompare(b.group) || b.score - a.score)) {
      counters[r.group] = (counters[r.group] || 0) + 1;
      const nn = String(counters[r.group]).padStart(2, '0');
      const desc = r.name.replace(/\.(pdf|jpg|jpeg|png|docx?|txt)$/i, '')
        .replace(/[_\-]+/g, ' ').trim().slice(0, 40);
      r.newName = `${r.group}-${nn}-${desc}-Date Unknown-${r.issue.split(' /')[0].slice(0, 22)}.pdf`;
      r.priority = nn;
    }
    return rows;
  },

  /* Missing-evidence checklist, driven by what groups/needs are uncovered */
  missing(rows, caseObj) {
    const have = (re) => rows.some(r => re.test(r.name) && !r.duplicateOf);
    const list = [];
    const add = (doc, why, issue, urgency, how) => list.push({ doc, why, issue, urgency, how });
    if (!have(/contract|appointment|offer/i))
      add('Full employment contract / appointment letter', 'Almost every CCMA matter turns on the written terms — without it the employer will argue the entitlement never existed.', 'Employment terms', 'High', 'Request from HR in writing; you are entitled to a copy (BCEA s29 written particulars).');
    if (!have(/payslip|salary slip/i))
      add('Payslips for the affected period', 'Proves earnings, deductions, and quantifies the remedy.', 'Financial loss / remedy', 'High', 'Download from payroll portal or request from payroll in writing.');
    if (!have(/7[\s.\-]?11|referral/i) && caseObj.disputeKey)
      add('LRA 7.11 referral + proof of service', 'Without proof the matter is properly referred and served, jurisdiction can be attacked on day one.', 'Procedural compliance', 'High', 'Use the CCMA forms tool here to draft it; serve on the employer and keep proof (email read-receipt, fax slip, or registered post).');
    if (!have(/grievance|objection|complaint/i))
      add('Your written objection / grievance', 'Defeats the "you accepted the change / delayed too long" attack — the single most common employer defence.', 'Acquiescence / delay defence', 'Medium', 'If you objected by email or WhatsApp, export those messages now. If you never objected in writing, note when and how you objected verbally and who heard it.');
    if (!have(/polic|handbook|scheme/i))
      add('The policy / scheme rules relied on', 'If a benefit or process is policy-based, the commissioner will want the clause itself, not a description of it.', 'Policy entitlement', 'Medium', 'Request from HR, the intranet, or colleagues; policies are workplace documents you may ask for.');
    if (!have(/witness|statement/i))
      add('Witness confirmation(s)', 'Independent corroboration converts your word-against-theirs into evidence.', 'Corroboration', 'Medium', 'Ask the witness to write and sign a short dated statement of what they saw or heard, in their own words.');
    return list;
  },

  /* Main bundle index — story order per the prompt's recommended sequence */
  bundleIndex(rows) {
    const order = [1, 2, 3, 4, 5, 6, 7, 8, 9];
    const main = rows.filter(r => r.include.startsWith('Yes'));
    const bySection = {};
    main.forEach(r => { (bySection[r.section] = bySection[r.section] || []).push(r); });
    const out = [];
    for (const s of order) if (bySection[s]) {
      bySection[s].sort((a, b) => b.score - a.score);
      out.push(...bySection[s]);
    }
    return out;
  },

  SECTION_LABELS: {
    1: 'CCMA referral & procedural documents',
    2: 'Contract, appointment & policies',
    3: 'Key employer decisions, refusals & admissions',
    4: 'Your objections, grievances & attempts to resolve',
    5: 'Medical-aid dispute evidence',
    6: 'Allowance / relocation / workplace-location evidence',
    7: 'Financial loss, payslips & remedy calculations',
    8: 'Witness confirmations & corroboration',
    9: 'Supporting correspondence & chronology',
    10: 'Reserve, duplicate or excluded',
  },
};

    const names = (docs || []).map(d => d.name).join(' | ');
    const matrix = this.ATTACKS.filter(a => a.applies(caseObj)).map(a => {
      const hasEvidence = a.defendsWith.test(names);
      return {
        ...a,
        evidence: hasEvidence
          ? (docs || []).filter(d => a.defendsWith.test(d.name)).map(d => d.name).slice(0, 3)
          : [],
        strengthLabel: hasEvidence ? ((docs || []).filter(d => a.defendsWith.test(d.name)).some(d => (d.score || 0) >= 85) ? 'Strong' : 'Moderate') : 'No evidence found',
        risk: hasEvidence ? 'Medium' : 'High',
      };
    });
    const gaps = matrix.filter(m => m.strengthLabel === 'No evidence found');
    const strong = matrix.filter(m => m.strengthLabel === 'Strong');
    // readiness per the prompt's Section 13 ratings
    let rating, ratingWhy;
    const gapShare = matrix.length ? gaps.length / matrix.length : 1;
    if (gapShare === 0 && strong.length >= 3) {

      ratingWhy = 'Every likely employer attack has documentary cover, with several strong defences.';

      rating = 'Risky unless missing evidence is obtained';
      ratingWhy = 'Several likely attacks currently have no documentary answer \u2014 the must-fix list is the priority.';
    } else {
      rating = 'Not ready';
      ratingWhy = 'Most likely attacks are currently unanswered on the file. Build the evidence base before referring or proceeding.';
    }
    return { matrix, gaps, strong, rating, ratingWhy,
      commissioner: this.COMMISSIONER, pressure: this.PRESSURE };
  },
};

    outcome: 'Knowing what you actually want shapes every step of the strategy.',
  },
  whyFor(key) { return this.WHY[key] || 'This strengthens your overall case.'; },

  coverage(elDef, ctx) {
    if (elDef.special === 'deadline') {
      if (!ctx.deadline) return 0;
      return { ok: 1, soon: 1, urgent: 0.7, missed: 0.15 }[ctx.deadline.status] ?? 0;
    }
    if (elDef.special === 'story') return ctx.timelineCount >= 3 ? 1 : ctx.timelineCount >= 1 ? 0.55 : 0;
    if (elDef.special === 'intake') return (ctx.c.messageCount || 0) >= 3 ? 1 : (ctx.c.messageCount || 0) > 0 ? 0.5 : 0;
    if (elDef.special === 'classified') return ctx.c.disputeKey ? 1 : 0;
    if (elDef.special === 'outcome') return ctx.c.desiredOutcome ? 1 : 0;
    // evidence-based element: a matching doc = proven; a pleaded + supported
    // issue row = mostly; pleaded only = started
    if (ctx.docNames.some(n => elDef.docRe.test(n))) return 1;
    const rows = ctx.c.issueRows || [];
    const pleaded = rows.filter(r => r.allegation && elDef.issueRe.test(r.allegation));
    if (pleaded.some(r => r.support)) return 0.65;
    if (pleaded.length) return 0.35;
    return 0;
  },

  /* MAIN — pure compute. ctx assembled by refresh(). */
  compute(c, docs, timelineCount, attackGaps) {
    const docNames = (docs || []).map(d => d.name);
    const deadline = (c.disputeKey && c.incidentDate && window.Deadline)
      ? window.Deadline.compute(c.disputeKey, c.incidentDate) : null;
    const ctx = { c, docNames, deadline, timelineCount: timelineCount || 0 };
    const defs = this.ELEMENTS[c.disputeKey] || this.ELEMENTS.generic;

    const elements = defs.map(d => {
      const cov = this.coverage(d, ctx);
      return { key: d.key, label: d.label, weight: d.w, coverage: cov,
        action: d.action, tab: d.tab,
        evidence: d.docRe ? docNames.filter(n => d.docRe.test(n)).slice(0, 2) : [] };
    });
    const weighted = elements.reduce((s, e) => s + e.weight * e.coverage, 0) / 100; // 0..1

    // Penalties — the honest deductions a lawyer would make
    const penalties = [];
    if (deadline && deadline.status === 'missed')
      penalties.push({ label: 'Referral deadline missed \u2014 condonation needed', points: 12 });
    const gapCount = attackGaps != null ? attackGaps
      : (window.EmployerAttack ? window.EmployerAttack.analyse(c, docs || []).gaps.length : 0);
    if (gapCount > 0)
      penalties.push({ label: gapCount + ' employer attack' + (gapCount > 1 ? 's' : '') + ' with no documentary answer', points: Math.min(8, gapCount * 2) });
    const weakRows = (c.issueRows || []).filter(r => r.weakness && !r.support).length;
    if (weakRows > 0)
      penalties.push({ label: weakRows + ' admitted weakness' + (weakRows > 1 ? 'es' : '') + ' without supporting evidence', points: Math.min(9, weakRows * 3) });

    const penaltyTotal = penalties.reduce((s, p) => s + p.points, 0);
    const score = Math.max(20, Math.min(88, Math.round(20 + 68 * weighted - penaltyTotal)));

    // Next best steps (R2): biggest unclosed element gains, then chase items
    const steps = [];
    for (const e of elements) {
      if (e.coverage < 1) {
        steps.push({ label: e.action, why: e.label, tab: e.tab,
          gain: Math.round(e.weight * (1 - e.coverage) * 0.68) });
      }
    }
    for (const ch of (c.chase || []).filter(x => !x.done).slice(0, 4)) {
      steps.push({ label: 'Obtain: ' + ch.doc, why: ch.why, tab: 'docs',
        gain: ch.urgency === 'High' ? 5 : 3 });
    }
    steps.sort((a, b) => b.gain - a.gain);

    return { score, elements, penalties, nextSteps: steps.slice(0, 4), deadline, gapCount };
  },

  /* refresh — load the live data, compute, persist on the case, snapshot
     history (R4). Call after anything meaningful changes. */
  async refresh(c) {
    if (!c) return null;
    let docs = [], tl = 0;
    try { docs = await DB.byIndex('documents', 'caseId', c.id); } catch {}
    try { tl = (await DB.byIndex('timeline', 'caseId', c.id)).length; } catch {}
    const s = this.compute(c, docs, tl);
    c._strength = { score: s.score, ts: Date.now(),
      elements: s.elements.map(e => ({ key: e.key, label: e.label, coverage: e.coverage })),
      penalties: s.penalties, gapCount: s.gapCount };
    c.successRate = s.score;                       // one number everywhere
    c.timelineCount = tl;
    // history snapshot (R4): only when the score actually moves
    c.strengthHist = c.strengthHist || [];
    const last = c.strengthHist[c.strengthHist.length - 1];
    if (!last || last.score !== s.score) {
      c.strengthHist.push({ ts: Date.now(), score: s.score });
      if (c.strengthHist.length > 40) c.strengthHist = c.strengthHist.slice(-40);
    }
    try { await DB.put('cases', c); } catch {}
    return s;
  },
};

const Chase = {
  STOP: /^(the|a|an|of|to|for|and|or|your|with|from|that|this|new|full)$/i,
  keywordRe(label) {
    const words = label.toLowerCase().replace(/[^a-z0-9\s]/g, ' ')
      .split(/\s+/).filter(w => w.length > 3 && !this.STOP.test(w)).slice(0, 5);
    return words.length ? words.join('|') : label.toLowerCase().slice(0, 12);
  },
  /* add items (deduped by doc label) from any source: bundle, attack, chat */
  add(c, items, source) {
    c.chase = c.chase || [];
    let added = 0;
    for (const it of items) {
      const key = (it.doc || '').toLowerCase().replace(/[^a-z0-9]+/g, ' ').trim();
      if (!key) continue;
      if (c.chase.some(x => x.key === key)) continue;
      c.chase.push({ id: uid('ch'), key, doc: it.doc, why: it.why || '',
        urgency: it.urgency || 'Medium', source, matchRe: this.keywordRe(it.doc),
        done: false, addedAt: Date.now(), doneAt: null });
      added++;
    }
    return added;
  },
  /* an upload arrived — auto-tick anything it satisfies */
  autoMatch(c, docName) {
    const hits = [];
    for (const ch of (c.chase || [])) {
      if (!ch.done && new RegExp(ch.matchRe, 'i').test(docName)) {
        ch.done = true; ch.doneAt = Date.now(); hits.push(ch.doc);
      }
    }
    return hits;
  },
};

const Quota = {
  /* Returns {limit, used, left, unlimited, firstUse} for a case */
  status(caseObj) {
    if (!caseObj) return { limit: 0, used: 0, left: 0, unlimited: false };
    const paid = caseObj.subscription === 'paid' && !this.expired(caseObj);
    if (paid) return { limit: Infinity, used: 0, left: Infinity, unlimited: true };

    const today = todayKey();
    const usage = caseObj.usage || {};
    const used = usage[today] || 0;

    // first-use bonus: applies only if this is the very first day any
    // question was asked for this case
    const everUsed = Object.keys(usage).length > 0;
    const firstUse = !everUsed || (Object.keys(usage).length === 1 && usage[today] !== undefined);
    const limit = firstUse ? QUOTA.FIRST_USE : QUOTA.DAILY_FREE;

    return { limit, used, left: Math.max(0, limit - used), unlimited: false, firstUse };
  },

  expired(caseObj) {
    if (!caseObj) return true;
    if (caseObj.subscription === 'paid') {
      return Date.now() > (caseObj.paidUntil || 0);
    }
    return Date.now() > (caseObj.trialEnds || 0);
  },

  daysLeft(caseObj) {
    if (!caseObj) return 0;
    const end = caseObj.subscription === 'paid' ? caseObj.paidUntil : caseObj.trialEnds;
    return Math.max(0, Math.ceil((end - Date.now()) / 86400000));
  },

  /* Consume one question. Returns true if allowed, false if blocked. */
  async consume(caseObj) {
    const st = this.status(caseObj);
    if (st.unlimited) return true;
    if (st.left <= 0) return false;
    const today = todayKey();
    caseObj.usage = caseObj.usage || {};
    caseObj.usage[today] = (caseObj.usage[today] || 0) + 1;
    await DB.put('cases', caseObj);
    return true;
  },
};

        reference: ' With a clean exit and a fair reference as the goal, a smart settlement may serve you better than a long fight.',
      }[caseObj.desiredOutcome];
      if (oc) out += oc;
    }
    return out;
  }

  /* Compute a success rate from evidence + answered follow-ups */
  function successRate(caseObj) {
    let score = 38;
    score += Math.min(30, (caseObj.docCount || 0) * 8);      // documents
    score += Math.min(22, (caseObj.answeredFollowUps || 0) * 6); // engagement
    if ((caseObj.messageCount || 0) > 8) score += 6;
    return Math.max(20, Math.min(88, Math.round(score)));
  }

  /* MAIN — produce one AI turn */
  async function respond(caseObj, userText) {
    const topic = classify(userText);
    caseObj.messageCount = (caseObj.messageCount || 0) + 1;

    /* --- OFF-TOPIC: case-scope enforcement --- */
    if (topic === 'offtopic') {
      caseObj.offTopicStrikes = (caseObj.offTopicStrikes || 0) + 1;
      await DB.put('cases', caseObj);
      if (caseObj.offTopicStrikes >= 2) {
        return {
          kind: 'redirect', offTopic: true,
          text: `That question falls outside your current case, which is scoped to **${(CASE_TYPES[caseObj.caseType] || {}).label}**. I can\u2019t give it the attention it deserves inside this matter \u2014 and mixing matters weakens both. To take it up properly, open it as a new case: that comes with a **7-day free trial**, then a once-off **R100** for 6 months. Shall I set that up?`,
          followUp: null, evidence: [], successRate: null,
        };
      }
      return {
        kind: 'redirect', offTopic: false,
        text: `I want to keep us focused on your current labour matter so nothing slips. If this is a separate issue, hold that thought \u2014 we can open it as its own case shortly. For now, is there anything more on the matter we\u2019re building?`,
        followUp: null, evidence: [], successRate: null,
      };
    }

    /* --- ON-TOPIC: build the attorney response --- */
    caseObj.answeredFollowUps = (caseObj.answeredFollowUps || 0) + 1;
    const opinion = buildOpinion(topic, caseObj);
    const fuBank = FOLLOWUPS[topic] || FOLLOWUPS.general;
    const fu = fuBank[(caseObj.answeredFollowUps - 1) % fuBank.length];
    const evidence = EVIDENCE[topic] || EVIDENCE.general;
    // R1: prefer the central element-based strength model; the quick
    // engagement formula is only the fallback before it exists
    const rate = (caseObj._strength && caseObj._strength.score)
      ? caseObj._strength.score : successRate(caseObj);

    // every 4th turn, lead with a brief rapport line (less frequent = less robotic)
    const useRapport = caseObj.messageCount > 1 && caseObj.messageCount % 4 === 0;
    const rapport = RAPPORT[(caseObj.messageCount / 4 | 0) % RAPPORT.length];

    let text = '';
    if (useRapport) text += rapport + '\n\n';
    text += opinion;
    // The follow-up question renders as its own highlighted block (see
    // renderMsg), so we don't tack a robotic connector sentence onto the text.

    // CCMA validity note for personal cases
    let validity = null;
    if ((CASE_TYPES[caseObj.caseType] || {}).ccmaValidity && caseObj.answeredFollowUps >= 2) {
      validity = 'Opinion cross-checked against SAFLII case law and current public CCMA commentary.';
    }
    // E4 — honest hedge: this offline engine works from what you type, and
    // cannot read inside your uploaded documents. Say so when docs exist, so the
    // estimate is never mistaken for a document-reviewed legal opinion.
    if ((caseObj.docCount || 0) > 0) {
      const hedge = 'Note: I\u2019m working from what you\u2019ve told me \u2014 I can\u2019t read the contents of your uploaded documents in this offline mode, so treat this as a guide, not a document-reviewed legal opinion.';
      validity = validity ? (validity + ' ' + hedge) : hedge;
    }

    // S14: escalation flag — detect doctrinally riskier matters
    const escalate = detectEscalation(userText, caseObj);

    await DB.put('cases', caseObj);

    return {
      kind: useRapport ? 'rapport' : 'opinion',
      offTopic: false,
      text,
      followUp: fu,
      evidence,
      successRate: rate,
      validity,
      escalate,
    };
  }

  /* ============================================================
     S14 — ESCALATION DETECTION
     Flags matters the strategy document lists as needing a human
     lawyer: discrimination, harassment, retirement-age dismissal,
     reviews, and Labour Court paths. Returns a reason string or null.
     ============================================================ */
  const ESCALATION_RULES = [
    // E3 — automatically-unfair dismissals first (most specific / highest stakes)
    { re: /\b(automatically unfair|whistleblow|protected disclosure|because i was pregnant|fired.*pregnan|dismiss.*pregnan|pregnan.*(fired|dismiss)|reported (corruption|fraud|wrongdoing)|union member|union activit|trade union|s187|section 187)/i,
      reason: 'automatically-unfair dismissal' },
    { re: /\b(discriminat|equal pay|unequal|race|racial|gender|pregnan|disab|religion|ethnic)/i,
      reason: 'discrimination' },
    { re: /\b(harass|sexual|bully|victimi|intimidat)/i,
      reason: 'harassment' },
    { re: /\b(retirement age|forced to retire|too old|mandatory retirement)/i,
      reason: 'retirement-age dismissal' },
    { re: /\b(review|set aside|take.*on review|section 145|s145|rescind|rescission)/i,
      reason: 'review' },
    { re: /\b(labour court|high court|interdict|urgent application)/i,
      reason: 'Labour Court' },
    // E3 — constructive dismissal is a tricky legal test
    { re: /\b(forced to resign|constructive dismissal|made me resign|had no choice but to resign|forced out)/i,
      reason: 'constructive dismissal' },
    // E3 — union / industrial-action matters
    { re: /\b(strike|lockout|go-slow|picket|industrial action)/i,
      reason: 'union/industrial action' },
    { re: /\b(collective|union recognition|organisational rights|bargaining council)/i,
      reason: 'collective dispute' },
  ];

  function detectEscalation(userText, caseObj) {
    const t = userText || '';
    for (const rule of ESCALATION_RULES) {
      if (rule.re.test(t)) return rule.reason;
    }
    // discrimination / constructive-dismissal dispute types also trigger it
    if (caseObj && caseObj.disputeKey === 'unfair_discrimination') return 'discrimination';
    if (caseObj && caseObj.disputeKey === 'constructive_dismissal') return 'constructive dismissal';
    return null;
  }

  function persona() { return PERSONA; }

  return { respond, persona, detectEscalation };
})();

/* expose for console/debug + DeepSeek-built modules + backend connector */
/* ============================================================
   SECTION 6b — VOICE MODULE
   Browser speech: SpeechRecognition (speech->text) +
   SpeechSynthesis (text->speech). Free, EN + AF, no API key.
   PHASE-2 hook: swap recognise()/speak() for a paid speech API
   for higher Afrikaans accuracy — the rest of the app is untouched.
   ============================================================ */
const Voice = (() => {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  const synth = window.speechSynthesis || null;
  // Voices load asynchronously in most browsers — warm them up so the first
  // spoken reply already uses the good voice, not the robotic fallback.
  if (synth) {
    try { synth.getVoices(); } catch {}
    if (typeof synth.onvoiceschanged !== 'undefined') {
      synth.onvoiceschanged = () => { try { synth.getVoices(); } catch {} };
    }
  }
  let rec = null;
  let listening = false;

  const supported = () => !!SR;
  const canSpeak = () => !!synth;

  const langCode = () => (State.lang === 'af' ? 'af-ZA' : 'en-ZA');

  /* Start listening. Calls handlers as speech is recognised.
     opts: { interim(text), final(text), end(), error(e) } */
  function listen(opts = {}) {
    if (!SR) { opts.error && opts.error('unsupported'); return; }
    stop();
    rec = new SR();
    rec.lang = langCode();
    rec.interimResults = true;
    rec.continuous = true;
    rec.maxAlternatives = 1;

    let finalText = '';
    rec.onresult = (e) => {
      let interim = '';
      for (let i = e.resultIndex; i < e.results.length; i++) {
        const tr = e.results[i][0].transcript;
        if (e.results[i].isFinal) finalText += tr + ' ';
        else interim += tr;
      }
      if (interim && opts.interim) opts.interim(interim);
      if (finalText && opts.final) opts.final(finalText.trim());
    };
    rec.onerror = (e) => { opts.error && opts.error(e.error || 'error'); };
    rec.onend = () => {
      listening = false;
      opts.end && opts.end(finalText.trim());
    };
    try { rec.start(); listening = true; }
    catch (err) { opts.error && opts.error('start-failed'); }
  }

  function stop() {
    if (rec) { try { rec.stop(); } catch {} rec = null; }
    listening = false;
  }

  /* Speak text aloud. onend fires when finished (used for hands-free). */
  function speak(text, onend) {
    if (!synth) { onend && onend(); return; }
    synth.cancel();
    // Clean for natural speech: drop markdown, turn paragraph breaks into
    // real sentence pauses, and strip section labels that sound odd aloud.
    let clean = String(text)
      .replace(/\*\*/g, '')
      .replace(/\u2014/g, ', ')          // em-dash → comma pause, not a hard stop
      .replace(/\n{2,}/g, '. ')          // paragraph break → sentence pause
      .replace(/\n/g, ', ')              // soft line break → short pause
      .replace(/\s*\.\s*\./g, '.')       // collapse accidental double periods
      .replace(/\s{2,}/g, ' ')
      .trim();
    const u = new SpeechSynthesisUtterance(clean);
    u.lang = langCode();
    // Slightly slower and a touch lower = calmer, less robotic, easier under stress.
    u.rate = 0.95; u.pitch = 0.98;
    u.voice = pickVoice();
    u.onend = () => onend && onend();
    u.onerror = () => onend && onend();
    synth.speak(u);
  }

  /* Choose the most natural available voice for the current language.
     Browsers expose cloud/"natural"/"enhanced" voices that sound far better
     than the default robotic one — prefer those, then fall back gracefully. */
  let _cachedVoice = null;
  function pickVoice() {
    if (_cachedVoice) return _cachedVoice;
    const voices = synth.getVoices();
    if (!voices.length) return null;
    const want = State.lang === 'af' ? 'af' : 'en';
    const za = State.lang === 'af' ? 'af-ZA' : 'en-ZA';
    const inLang = voices.filter(v => v.lang && v.lang.toLowerCase().startsWith(want));
    const pool = inLang.length ? inLang : voices;
    // Named voices that are known to sound natural across platforms, best first.
    const PREFERRED = [
      /Google UK English Female/i, /Google US English/i, /Microsoft (Aria|Jenny|Libby|Sonia|Natasha)/i,
      /Samantha/i, /Karen/i, /Moira/i, /Tessa/i, /Siri/i,
    ];
    for (const re of PREFERRED) {
      const hit = pool.find(v => re.test(v.name));
      if (hit) return (_cachedVoice = hit);
    }
    // generic quality hints
    const good = /natural|neural|enhanced|premium|google|siri|online|wavenet/i;
    _cachedVoice = (
      pool.find(v => v.lang === za && good.test(v.name)) ||
      pool.find(v => good.test(v.name)) ||
      pool.find(v => v.lang === za && !/compact/i.test(v.name)) ||
      pool.find(v => !/compact/i.test(v.name)) ||
      pool[0]
    );
    return _cachedVoice;
  }
  function pickVoice_old() {
    const voices = synth.getVoices();
    if (!voices.length) return null;
    const want = State.lang === 'af' ? 'af' : 'en';
    const za = State.lang === 'af' ? 'af-ZA' : 'en-ZA';
    const inLang = voices.filter(v => v.lang && v.lang.toLowerCase().startsWith(want));
    const pool = inLang.length ? inLang : voices;
    // quality hints various platforms use for their better voices
    const good = /natural|neural|enhanced|premium|google|siri|online|wavenet/i;
    return (
      pool.find(v => v.lang === za && good.test(v.name)) ||
      pool.find(v => good.test(v.name)) ||
      pool.find(v => v.lang === za) ||
      pool.find(v => !/compact/i.test(v.name)) ||   // avoid low-quality "compact" voices
      pool[0]
    );
  }

  function shutUp() { if (synth) synth.cancel(); }
  function isListening() { return listening; }

  return { supported, canSpeak, listen, stop, speak, shutUp, isListening };
})();
window.Voice = Voice;

/* ============================================================
   SECTION 6c — NOTE EXTRACTION ENGINE
   Turns a spoken conversation transcript into structured,
   editable case notes that clarify the evidence.
   PHASE-2: when real AI is on, the backend extracts notes far
   more accurately; this is the offline fallback.
   ============================================================ */
const NoteExtractor = (() => {
  /* Patterns that signal a fact worth capturing as a note */
  const SIGNALS = [
    { re: /\b(no|never|didn[' ]?t|did not|wasn[' ]?t|was not)\b.{0,40}\b(warning|hearing|notice|contract|payslip|reason|chance)\b/i,
      tag: 'Procedural', why: 'A missing step often makes a dismissal procedurally unfair.' },
    { re: /\b(verbal|verbally|told me|said to me|promised|over the phone)\b/i,
      tag: 'Verbal account', why: 'Verbal statements need corroboration — flag for follow-up evidence.' },
    { re: /\b(witness|saw it|colleague|someone else|in front of)\b/i,
      tag: 'Witness', why: 'A potential witness — get their name and a statement.' },
    { re: /\b(date|on the|last week|last month|january|february|march|april|may|june|july|august|september|october|november|december|\d{1,2}\s*(st|nd|rd|th)?)\b/i,
      tag: 'Timeline', why: 'A date or sequence point — confirm and add to the timeline.' },
    { re: /\b(signed|sign|i signed|made me sign|asked to sign)\b/i,
      tag: 'Document signed', why: 'Signing under pressure can waive rights — clarify the circumstances.' },
    { re: /\b(money|salary|wage|owed|unpaid|deduct|short paid|overtime|bonus)\b/i,
      tag: 'Financial', why: 'A money issue — payslips and bank statements will support this.' },
    { re: /\b(suspended|suspension|sent home|told to stay)\b/i,
      tag: 'Suspension', why: 'Suspension terms matter — was it with or without pay?' },
  ];

  /* Split transcript into sentences, score each, keep the meaningful ones */
  function extract(transcript) {
    if (!transcript || transcript.trim().length < 4) return [];
    const sentences = transcript
      .replace(/\n+/g, ' ')
      .split(/(?<=[.!?])\s+|\s*;\s*/)
      .map(s => s.trim())
      .filter(s => s.length > 8);

    const notes = [];
    const seen = new Set();
    for (const s of sentences) {
      for (const sig of SIGNALS) {
        if (sig.re.test(s)) {
          const key = s.toLowerCase().slice(0, 40);
          if (seen.has(key)) continue;
          seen.add(key);
          notes.push({
            text: s.charAt(0).toUpperCase() + s.slice(1),
            tag: sig.tag,
            why: sig.why,
          });
          break; // one tag per sentence
        }
      }
    }
    return notes.slice(0, 12);
  }

  /* A short clarifying question the AI can ask after a voice note */
  function clarifier(notes) {
    if (!notes.length) return null;
    const byTag = {};
    notes.forEach(n => { byTag[n.tag] = (byTag[n.tag] || 0) + 1; });
    if (byTag['Verbal account'])
      return 'You mentioned something was said verbally — do you have any message, email or witness that backs that up?';
    if (byTag['Witness'])
      return 'You referred to someone who was present — could you give me their name so we can note them as a witness?';
    if (byTag['Document signed'])
      return 'You said you signed something — were you given time to read it, or asked to sign on the spot?';
    if (byTag['Timeline'])
      return 'You gave me some dates — can you confirm the exact order things happened in?';
    return 'Thank you — is there anything from what you just told me that you have a document or message to prove?';
  }

  return { extract, clarifier };
})();
window.NoteExtractor = NoteExtractor;

/* ============================================================
   SECTION 8 — ROUTING & RENDER ORCHESTRATION
   render() is called after every state change.
   View builders (renderLanding, renderAuth, renderApp...) live
   in the section files below / appended by build modules.
   ============================================================ */
function render() {
  const app = $('#app');
  // C5 — remember scroll position per tab so switching back doesn't reset to top
  const prevBody = app.querySelector('#mainBody');
  if (prevBody && State._scrollTab) State._scroll = State._scroll || {};
  if (prevBody && State._scrollTab) State._scroll[State._scrollTab] = prevBody.scrollTop;
  app.innerHTML = '';
  if (State.screen === 'landing') app.appendChild(Views.landing());
  else if (State.screen === 'auth') app.appendChild(Views.auth());
  else if (State.screen === 'app') app.appendChild(Views.appShell());
  window.scrollTo(0, 0);
  // restore scroll for the tab we're now on
  const newBody = app.querySelector('#mainBody');
  if (newBody) {
    const want = (State._scroll && State._scroll[State.tab]) || 0;
    newBody.scrollTop = want;
    State._scrollTab = State.tab;
  }
}

function go(screen, opts = {}) {
  State.screen = screen;
  if (opts.tab) State.tab = opts.tab;
  render();
}

/* ============================================================
   SECTION 9 — MODAL SYSTEM
   ============================================================ */
const Modal = {
  _lastFocus: null,
  open(node) {
    // S19 (WCAG 2.2 AA): proper dialog semantics + focus management
    node.setAttribute('role', 'dialog');
    node.setAttribute('aria-modal', 'true');
    const heading = node.querySelector('h3, h2, h4');
    if (heading) {
      if (!heading.id) heading.id = 'modalTitle_' + Math.random().toString(36).slice(2, 7);
      node.setAttribute('aria-labelledby', heading.id);
    }
    // label any icon-only close button for screen readers
    const close = node.querySelector('.modal-close');
    if (close && !close.getAttribute('aria-label')) close.setAttribute('aria-label', 'Close');
    this._lastFocus = document.activeElement;
    $('#modalHost').innerHTML = '';
    $('#modalHost').appendChild(node);
    $('#modalOverlay').classList.add('show');
    // move focus into the dialog
    const focusable = node.querySelector('button, [href], input, select, textarea, [tabindex]:not([tabindex="-1"])');
    if (focusable) setTimeout(() => focusable.focus(), 30);
  },
  close() {
    $('#modalOverlay').classList.remove('show');
    $('#modalHost').innerHTML = '';
    // return focus to where the user was (keyboard accessibility)
    if (this._lastFocus && this._lastFocus.focus) { try { this._lastFocus.focus(); } catch {} }
    this._lastFocus = null;
  },
};
document.addEventListener('click', (e) => {
  if (e.target.id === 'modalOverlay') Modal.close();
});
// S19: Escape closes any open modal
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape' && $('#modalOverlay').classList.contains('show')) Modal.close();
});

/* A5 — theme (auto / light / dark) with persistence */
function currentTheme() {
  try { return localStorage.getItem('mlr-theme') || 'light'; } catch { return 'light'; }
}
function applyTheme(mode) {
  try { localStorage.setItem('mlr-theme', mode); } catch {}
  const root = document.documentElement;
  if (mode === 'auto') root.removeAttribute('data-theme');
  else root.setAttribute('data-theme', mode);
  // keep the native status-bar colour in step with the theme
  const dark = mode === 'dark' || (mode === 'auto' &&
    window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches);
  const meta = document.querySelector('meta[name="theme-color"]');
  if (meta) meta.setAttribute('content', dark ? '#15120c' : '#0d2818');
}

async function boot() {
  applyTheme(currentTheme());   // A5 — apply saved theme before first paint
  // B5 — capture the install prompt so we can offer an "Install" button
  window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault(); window.__installPrompt = e;
  });
  await DB.open();

  // register service worker (PWA / offline)
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js').catch(() => {});
    // F4 — a newer build is cached: offer a one-tap refresh (don't force it)
    let updateOffered = false;
    navigator.serviceWorker.addEventListener('message', (e) => {
      if (e.data && e.data.type === 'sw-updated' && !updateOffered) {
        updateOffered = true;
        const bar = el(`<div class="update-bar">
          <span>${ICONS.spark} A new version is ready.</span>
          <button class="btn btn-gold btn-sm" id="updYes">Refresh</button></div>`);
        document.body.appendChild(bar);
        bar.querySelector('#updYes').onclick = () => location.reload();
        setTimeout(() => bar.remove(), 12000);
      }
    });
  }

  // handle PayFast return: ?paid=1 unlocks the most recent trial case
  const params = new URLSearchParams(location.search);
  if (params.get('paid') === '1') {
    const meta = await DB.get('meta', 'session');
    if (meta && meta.userId) {
      const cs = await DB.byIndex('cases', 'userId', meta.userId);
      const target = cs.filter(c => c.subscription !== 'paid')
        .sort((a, b) => b.createdAt - a.createdAt)[0];
      if (target) {
        const cfg = CASE_TYPES[target.caseType];
        target.subscription = 'paid';
        target.paidUntil = Date.now() + cfg.durationMonths * 30 * 86400000;
        if (target.status === 'Intake') target.status = 'Building case';
        await DB.put('cases', target);
        setTimeout(() => toast('Payment confirmed \u2014 case unlocked for 6 months.'), 600);
      }
    }
    history.replaceState({}, '', location.pathname);
  }

  // restore session
  const meta = await DB.get('meta', 'session');
  if (meta && meta.userId) {
    const u = await DB.get('users', meta.userId);
    if (u) {
      State.user = u;
      State.lang = u.lang || 'en';
      State.cases = await DB.byIndex('cases', 'userId', u.id);
      State.activeCaseId = State.cases.length ? State.cases[0].id : null;
      State.screen = State.cases.length ? 'app' : 'auth';
    }
  }
  render();
}

document.addEventListener('DOMContentLoaded', boot);

  async function doAuth(viaGoogle) {
    const isSignup = authMode === 'signup';
    let name, email, lang = State.lang, pass;

    if (viaGoogle) {
      // PHASE-2: replace with real Google OAuth verification
      name = 'Thabo Mokoena'; email = 'thabo.demo@gmail.com';
    } else {
      email = ($('#auEmail') || {}).value?.trim();
      pass = ($('#auPass') || {}).value;
      name = ($('#auName') || {}).value?.trim() || email?.split('@')[0];
      lang = ($('#auLang') || {}).value || State.lang;
      if (!email || !pass) { toast('Please enter your email and password.', 'alert'); return; }
    }

    if (isSignup || viaGoogle) {
      let existing = (await DB.all('users')).find(u => u.email === email);
      let user;
      if (existing) {
        user = existing;
      } else {
        user = {
          id: uid('usr'), name, email, lang,
          createdAt: Date.now(),
          onboarded: false,
          firstLoginDone: false,
        };
        await DB.put('users', user);
      }
      State.user = user; State.lang = user.lang || 'en';
      await DB.put('meta', { key: 'session', userId: user.id });
      State.cases = await DB.byIndex('cases', 'userId', user.id);
      State.activeCaseId = State.cases.length ? State.cases[0].id : null;

      // first login -> onboarding popups, then case creation
      if (!user.onboarded) {
        startOnboarding();
      } else if (!State.cases.length) {
        go('app'); openNewCaseModal(true);
      } else {
        go('app');
      }
    } else {
      // login
      const user = (await DB.all('users')).find(u => u.email === email);
      if (!user) { toast('No account found \u2014 try signing up.', 'alert'); return; }
      State.user = user; State.lang = user.lang || 'en';
      await DB.put('meta', { key: 'session', userId: user.id });
      State.cases = await DB.byIndex('cases', 'userId', user.id);
      State.activeCaseId = State.cases.length ? State.cases[0].id : null;
      if (!State.cases.length) { go('app'); openNewCaseModal(true); }
      else go('app');
      toast('Welcome back, ' + user.name.split(' ')[0] + '.');
    }
  }

  async function createCase(type, name, desc, intake = {}) {
    const cfg = CASE_TYPES[type];
    const now = Date.now();
    const c = {
      id: uid('case'), userId: State.user.id,
      caseType: type, name, description: desc,
      createdAt: now,
      subscription: 'trial',
      trialEnds: now + cfg.trialDays * 86400000,
      paidUntil: null,
      usage: {},
      messageCount: 0, answeredFollowUps: 0, docCount: 0,
      offTopicStrikes: 0,
      status: 'Intake',
      successRate: null,
      // B3 — deadline-critical intake captured up front (clock starts now)
      disputeKey: intake.disputeKey || null,
      incidentDate: intake.incidentDate || null,
    };
    await safeWrite('cases', c, 'your new case');
    // F1 — now that the user has real data, ask the browser to keep it safe
    DB.persist().then(okPersist => {
      if (!okPersist && window.__installPrompt) {
        toast('Tip: install the app to keep your case safe on this device.', 'mic');
      }
    });
    State.cases = await DB.byIndex('cases', 'userId', State.user.id);
    State.activeCaseId = c.id;
    State.tab = 'chat';

    // seed the opening AI message
    const intro = {
      id: uid('msg'), caseId: c.id, role: 'ai', ts: now,
      kind: 'opinion',
      text: `Thank you \u2014 I\u2019ve opened your case, **${esc(name)}**.\n\nI\u2019m going to act as your labour-law attorney here. ${desc ? 'I\u2019ve read your summary.' : ''} I\u2019ll ask focused questions so we build a precise, honest account \u2014 and I\u2019ll be straight with you about both the strengths and the pitfalls.\n\nLet\u2019s begin: walk me through what happened, in the order it happened. Start from the first thing that felt wrong.`,
    };
    await DB.put('messages', intro);
    render();
    toast('Case created \u2014 your free trial has started.');
  }

    const mt = root.querySelector('#mainTabs');
    const mn = root.querySelector('#mobNav');
    TABS.forEach(([id, key, ic]) => {
      const b = el(`<button class="mtab ${State.tab === id ? 'on' : ''}">${ic}<span>${t(key)}</span></button>`);
      b.onclick = () => { State.tab = id; render(); };
      mt.appendChild(b);
    });
    // C1 — mobile: five groups. Tapping a group opens its last-used (or default) member.
    if (mn) {
      State.lastSub = State.lastSub || {};
      const activeGroup = groupOf(State.tab);
      GROUPS.forEach(g => {
        const on = g.id === activeGroup.id;
        const mb = el(`<button class="${on ? 'on' : ''}" aria-label="${g.label}">${g.ic}<span>${g.label}</span></button>`);
        mb.onclick = () => {
          const target = (State.lastSub[g.id] && g.members.includes(State.lastSub[g.id]))
            ? State.lastSub[g.id] : g.members[0];
          State.tab = target; render();
        };
        mn.appendChild(mb);
      });
      State.lastSub[activeGroup.id] = State.tab;
    }

    root.querySelector('#sideNew').onclick = () => openNewCaseModal(false);
    root.querySelector('#privacyBtn').onclick = () => openPrivacySettings();
    root.querySelector('#logoutBtn').onclick = async () => {
      await DB.put('meta', { key: 'session', userId: null });
      State.user = null; State.cases = []; State.activeCaseId = null;
      go('landing');
    };
    root.querySelectorAll('#appLang button').forEach(b =>
      b.onclick = async () => {
        State.lang = b.dataset.l;
        if (State.user) { State.user.lang = b.dataset.l; await DB.put('users', State.user); }
        render();
      });
    if (c) root.querySelector('#topCaseName').textContent = c.name;

    // render active tab body
    const body = root.querySelector('#mainBody');
    if (!c) {
      body.appendChild(noCaseEmpty());
    } else {
      // C1 — segmented sub-nav for groups with more than one member
      const g = groupOf(State.tab);
      if (g.members.length > 1) {
        const seg = el(`<div class="subnav" role="tablist" aria-label="${g.label} sections"></div>`);
        g.members.forEach(mid => {
          const on = State.tab === mid;
          const sb = el(`<button role="tab" aria-selected="${on}" class="${on ? 'on' : ''}">${SUBLABELS[mid] || mid}</button>`);
          sb.onclick = () => { State.tab = mid; render(); };
          seg.appendChild(sb);
        });
        body.appendChild(seg);
      }
      const view = {
        dashboard: tabDashboard, chat: tabChat, notes: tabNotes, docs: tabDocs,
        timeline: tabTimeline, builder: tabBuilder, actions: tabActions, firms: tabFirms,
        prepare: tabPrepare,
        resources: tabResources,
      }[State.tab] || tabDashboard;
      view(body, c);
    }
    return root;
  }

  function noCaseEmpty() {
    // If the person has cases, show a picker so they can re-enter one.
    if (State.cases && State.cases.length) {
      const n = el(`<div class="case-picker">
        <h2 class="cp-title">Your cases</h2>
        <p class="cp-sub">Pick a case to continue, or start a new one.</p>
        <div class="cp-list" id="cpList"></div>
        <button class="btn btn-primary btn-block mt16" id="cpNew">${ICONS.plus} ${t('new_case')}</button>
      </div>`);
      const list = n.querySelector('#cpList');
      State.cases.forEach(cs => {
        const cfg = CASE_TYPES[cs.caseType] || {};
        const card = el(`<button class="cp-card">
          <div class="cp-card-ico">${ICONS.scale}</div>
          <div class="cp-card-body">
            <strong>${esc(cs.name)}</strong>
            <span>${esc(cfg.label || cs.caseType)}${cs.successRate ? ' \u00b7 ' + cs.successRate + '% strength' : ''}</span>
          </div>
          <span class="cp-card-go">${ICONS.arrow || '\u203a'}</span>
        </button>`);
        card.onclick = () => { State.activeCaseId = cs.id; State.tab = 'dashboard'; render(); };
        list.appendChild(card);
      });
      n.querySelector('#cpNew').onclick = () => openNewCaseModal(false);
      return n;
    }
    const n = el(`<div class="empty">${ICONS.scale}
      <h3>No case open yet</h3>
      <p>Create your first case to start building your file with Lee, your AI advisor.</p>
      <button class="btn btn-primary" id="emptyNew">${ICONS.plus} ${t('new_case')}</button></div>`);
    n.querySelector('#emptyNew').onclick = () => openNewCaseModal(false);
    return n;
  }

  /* ====== expose ====== */
  return {
    landing, auth, appShell,
    openNewCaseModal, _activeCase: activeCase, _fmt: fmt, _el: el,
  };

  /* tab builders are attached below via Object.assign */
})();

/* ---- S1/S2: deadline badge + panel ---- */
function dlBadge(c) {
  if (!c.disputeKey || !c.incidentDate) return '';
  const d = window.Deadline.compute(c.disputeKey, c.incidentDate);
  if (!d) return '';
  if (d.status === 'missed') return 'Deadline passed';
  return d.daysLeft + ' days left';
}

function renderDeadlinePanel(host, c) {
  if (!host) return;
  // already classified -> show the deadline result
  if (c.disputeKey && c.incidentDate) {
    const d = window.Deadline.compute(c.disputeKey, c.incidentDate);
    const dt = window.DISPUTE_TYPES[c.disputeKey];
    const colour = d.status === 'missed' ? 'var(--rust)'
      : d.status === 'urgent' ? 'var(--rust)'
      : d.status === 'soon' ? 'var(--gold-deep)' : 'var(--moss)';
    const msg = d.status === 'missed'
      ? `The usual ${d.windowDays}-day window has passed. You can still apply for <strong>condonation</strong> \u2014 asking the CCMA to accept a late referral with a good explanation. The AI attorney can help you draft that explanation.`
      : d.status === 'urgent'
      ? `Only <strong>${d.daysLeft} days</strong> left to refer. Act now \u2014 late referrals need condonation and many strong cases are lost on timing alone.`
      : d.status === 'soon'
      ? `<strong>${d.daysLeft} days</strong> left to refer. Don\u2019t leave it to the last moment.`
      : `You have <strong>${d.daysLeft} days</strong> to refer this dispute. Good \u2014 but the sooner your file is ready, the better.`;
    host.innerHTML = `
      <div class="dl-result" style="border-left:4px solid ${colour}">
        <div class="dl-top">
          <span class="dl-type">${State.lang === 'af' ? dt.label_af : dt.label}</span>
          <span class="dl-days" style="color:${colour}">${d.status === 'missed' ? 'Passed' : d.daysLeft + 'd'}</span>
        </div>
        <p class="dl-msg">${msg}</p>
        <div class="dl-meta">
          <div><span class="k">Incident date</span><span class="v">${fmtDate(d.incidentDate)}</span></div>
          <div><span class="k">Refer by</span><span class="v">${fmtDate(d.deadlineDate)}</span></div>
        </div>
        <div class="dl-basis">${ICONS.scale} <span>${d.basis}</span></div>

        <div class="forum-path" id="forumPath">
          <div class="fp-title">${ICONS.grid} Where your matter goes next</div>
          ${window.Deadline.forumPath(c.disputeKey).map((step, i, arr) => `
            <div class="fp-step">
              <div class="fp-dot">${ICONS[step.icon] || ICONS.check}</div>
              <div class="fp-body">
                <strong>${step.label}</strong>
                <span>${step.detail}</span>
              </div>
              ${i < arr.length - 1 ? '<div class="fp-line"></div>' : ''}
            </div>`).join('')}
        </div>

        <div class="outcome-box" id="outcomeBox"></div>

        <button class="btn btn-ghost btn-sm mt12" id="dlRedo">Change dispute type or date</button>
      </div>`;
    host.querySelector('#dlRedo').onclick = () => { c._showWizard = true; renderDeadlinePanel(host, c); };
    renderOutcomeBox(host.querySelector('#outcomeBox'), c);
    return;
  }

  // not yet classified (or redo) -> show the guided wizard
  const q = window.CLASSIFIER_QUESTIONS[0];
  host.innerHTML = `
    <p class="txt-sm txt-muted" style="margin-bottom:14px">Answer two quick questions and we\u2019ll work out your dispute type and your CCMA deadline. This is the single most important thing to get right.</p>
    <div class="dl-wizard">
      <label class="dl-q">${State.lang === 'af' ? q.q_af : q.q}</label>
      <div class="dl-opts" id="dlOpts">
        ${q.options.map(o => `<button class="dl-opt" data-v="${o.v}">${o.t}</button>`).join('')}
      </div>
      <div id="dlDateWrap" style="display:none">
        <label class="dl-q mt16" id="dlDateLabel">When did it happen? (date of the incident or dismissal)</label>
        <input type="date" id="dlDate" class="dl-date" max="${new Date().toISOString().slice(0,10)}" />
        <button class="btn btn-primary mt12" id="dlCalc">Calculate my deadline</button>
      </div>
    </div>`;
  let chosen = null;
  host.querySelectorAll('.dl-opt').forEach(b => b.onclick = () => {
    host.querySelectorAll('.dl-opt').forEach(x => x.classList.remove('on'));
    b.classList.add('on');
    chosen = window.classifyDispute(b.dataset.v, '');
    host.querySelector('#dlDateWrap').style.display = 'block';
  });
  host.querySelector('#dlCalc').onclick = async () => {
    const date = host.querySelector('#dlDate').value;
    if (!chosen || !date) return;
    c.disputeKey = chosen;
    c.incidentDate = date;
    c._showWizard = false;
    try { await DB.put('cases', c); } catch (e) {}
    renderDeadlinePanel(host, c);
  };
}

];

/* ---- R8: slim case-health strip shown above every tab ---- */
async function fillHealthStrip(strip, c) {
  if (!strip || !c) { if (strip) strip.style.display = 'none'; return; }
  // use the cached strength if fresh; refresh quietly otherwise
  let st = c._strength;
  if (!st || Date.now() - st.ts > 60000) {
    const s = await window.CaseStrength.refresh(c);
    st = c._strength; if (!s) { strip.style.display = 'none'; return; }
  }
  const dl = (c.disputeKey && c.incidentDate && window.Deadline)
    ? window.Deadline.compute(c.disputeKey, c.incidentDate) : null;
  const openChase = (c.chase || []).filter(x => !x.done).length;
  strip.style.display = 'flex';
  strip.innerHTML = `
    <button class="hs-item" data-go="dashboard" title="Case strength">
      ${ICONS.scale}<b>${st.score}%</b><span>strength</span></button>
    ${dl ? `<button class="hs-item hs-${dl.status}" data-go="dashboard" title="Referral deadline">
      ${ICONS.clock}<b>${dl.status === 'missed' ? 'Missed' : dl.daysLeft + 'd'}</b><span>${dl.status === 'missed' ? 'condonation' : 'to refer'}</span></button>` : ''}
    ${openChase ? `<button class="hs-item" data-go="dashboard" title="Evidence to chase">
      ${ICONS.list}<b>${openChase}</b><span>to chase</span></button>` : ''}
  `;
  strip.querySelectorAll('.hs-item').forEach(b => b.onclick = () => { State.tab = b.dataset.go; render(); });
}

/* ---- R1/R2/R3/R4: the case-strength panel ---- */
async function renderStrengthPanel(panel, c) {
  if (!panel) return;
  const s = await window.CaseStrength.refresh(c);
  if (!s) return;

  // C4 — journey progress chip (Understand → Build → Prepare → Act)
  const chipHost = document.getElementById('journeyChip');
  if (chipHost) {
    const covered = s.elements.filter(e => e.coverage >= 1).length;
    const total = s.elements.length;
    const ranTools = !!(c.lastBundleRun || c.lastAttackRun);
    let stage = 0;                                   // 0 understand,1 build,2 prepare,3 act
    if ((c.messageCount || 0) >= 2 || covered >= 1) stage = 1;
    if (covered >= Math.ceil(total / 2)) stage = 2;
    if (ranTools && covered >= Math.ceil(total * 0.6)) stage = 3;
    const stages = ['Understand', 'Build', 'Prepare', 'Act'];
    chipHost.className = 'journey';
    chipHost.innerHTML = stages.map((st, i) =>
      `<div class="jstage ${i < stage ? 'done' : ''} ${i === stage ? 'now' : ''}">
        <span class="jdot"></span><span class="jlbl">${st}</span></div>`).join('<span class="jline"></span>');
  }

  // C3 — "Your next move" hero card (the single highest-gain action)
  const heroHost = document.getElementById('nextMoveHero');
  if (heroHost) {
    const top = s.nextSteps && s.nextSteps[0];
    if (top) {
      heroHost.className = 'nextmove';
      heroHost.innerHTML = `
        <div class="nm-icon">${ICONS.spark}</div>
        <div class="nm-body">
          <span class="nm-kicker">Your next move${top.gain ? ` \u00b7 +${top.gain}% strength` : ''}</span>
          <strong class="nm-title">${esc(top.label)}</strong>
          <em class="nm-why">${esc(top.why)}</em>
        </div>
        <button class="nm-go" aria-label="Go to ${esc(top.tab)}">${ICONS.arrowRight || '\u2192'}</button>`;
      heroHost.querySelector('.nm-go').onclick = () => { State.tab = top.tab || 'docs'; render(); };
      heroHost.onclick = (e) => { if (e.target.closest('.nm-go')) return; State.tab = top.tab || 'docs'; render(); };
    } else {
      heroHost.className = 'nextmove done';
      heroHost.innerHTML = `<div class="nm-icon">${ICONS.check}</div>
        <div class="nm-body"><span class="nm-kicker">Strong position</span>
        <strong class="nm-title">Every part of your case is covered</strong>
        <em class="nm-why">Keep your file updated as anything new comes in.</em></div>`;
    }
  }

  const pill = panel.querySelector('#spPill');
  const bodyEl = panel.querySelector('#spBody');
  if (!pill || !bodyEl) return;
  pill.textContent = s.score + '% \u00b7 estimate';
  pill.className = 'pill ' + (s.score >= 60 ? 'pill-forest' : 'pill-line');

  const hist = c.strengthHist || [];
  const delta = hist.length >= 2 ? s.score - hist[hist.length - 2].score : 0;
  // sparkline (R4)
  let spark = '';
  if (hist.length >= 2) {
    const vals = hist.slice(-20).map(h => h.score);
    const min = Math.min(...vals) - 2, max = Math.max(...vals) + 2;
    const pts = vals.map((v, i) =>
      `${(i / (vals.length - 1) * 100).toFixed(1)},${(34 - ((v - min) / (max - min)) * 30).toFixed(1)}`).join(' ');
    spark = `<svg class="sp-spark" viewBox="0 0 100 36" preserveAspectRatio="none" aria-hidden="true">
      <polyline points="${pts}" fill="none" stroke="var(--forest)" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
  }

  const chase = (c.chase || []);
  const openChase = chase.filter(x => !x.done);
  const doneChase = chase.filter(x => x.done);

  bodyEl.innerHTML = `
    <div class="sp-top">
      <div class="sp-score"><span class="sp-num">${s.score}<small>%</small></span>
        ${delta !== 0 ? `<span class="sp-delta ${delta > 0 ? 'up' : 'down'}">${delta > 0 ? '\u25b2 +' : '\u25bc '}${delta}</span>` : ''}
        <span class="sp-cap">never certainty \u2014 an evidence-based estimate, capped at 88%</span></div>
      ${spark ? `<div class="sp-sparkwrap">${spark}<span class="sp-sparklbl">your progress</span></div>` : ''}
    </div>

    <div class="sp-elements">
      ${s.elements.map((e, i) => `
        <div class="sp-el">
          <button class="sp-el-top" aria-expanded="false" data-eli="${i}">
            <span>${esc(e.label)}</span><b>${Math.round(e.coverage * 100)}%</b>
            <span class="sp-el-caret">${ICONS.chevron || '\u203a'}</span>
          </button>
          <div class="sp-bar"><div class="sp-fill ${e.coverage >= 1 ? 'full' : e.coverage >= 0.5 ? 'mid' : 'low'}" style="width:${Math.max(4, e.coverage * 100)}%"></div></div>
          <div class="sp-el-why" hidden>${esc(window.CaseStrength.whyFor(e.key))}</div>
        </div>`).join('')}
    </div>

    ${s.penalties.length ? `
    <div class="sp-pens">
      ${s.penalties.map(p => `<div class="sp-pen">${ICONS.shield}<span>${esc(p.label)}</span><b>\u2212${p.points}</b></div>`).join('')}
    </div>` : ''}

    ${s.nextSteps.length ? `
    <div class="sp-next">
      <h5>${ICONS.spark} Your next best move${s.nextSteps.length > 1 ? 's' : ''}</h5>
      ${s.nextSteps.map((st, i) => `
        <button class="sp-step ${i === 0 ? 'primary' : ''}" data-tab="${st.tab}">
          <span class="sp-step-gain">+${st.gain}</span>
          <span class="sp-step-body"><strong>${esc(st.label)}</strong><em>${esc(st.why)}</em></span>
          <span class="sp-step-go">\u2192</span>
        </button>`).join('')}
    </div>` : `<div class="sp-next"><h5>${ICONS.check} Every element is covered</h5><p class="txt-sm txt-muted">Strong position \u2014 keep the file updated as anything new arrives.</p></div>`}

    ${chase.length ? `
    <div class="sp-chase">
      <h5>${ICONS.list} Evidence to chase <span class="pro-count">${doneChase.length}/${chase.length} obtained</span></h5>
      ${openChase.map(ch => `
        <label class="sp-chitem">
          <input type="checkbox" data-ch="${ch.id}" />
          <span class="sp-ch-body"><strong>${esc(ch.doc)}</strong>
            <em>${esc(ch.why)}</em>
            <i class="pro-urgency u-${(ch.urgency || 'medium').toLowerCase()}">${ch.urgency}</i></span>
        </label>`).join('')}
      ${doneChase.slice(-3).map(ch => `
        <div class="sp-chitem done">${ICONS.check}<span class="sp-ch-body"><strong>${esc(ch.doc)}</strong><em>obtained \u2014 strength updated</em></span></div>`).join('')}
    </div>` : ''}

    <div class="sp-lawdate">${ICONS.shield} Law current as of ${(window.LEGAL_CHANGELOG && window.LEGAL_CHANGELOG[0] ? window.LEGAL_CHANGELOG[0].date : '2026')} \u00b7 this is an estimate, not legal advice</div>`;

  // next-step navigation (R2)
  bodyEl.querySelectorAll('.sp-step').forEach(b => b.onclick = () => {
    State.tab = b.dataset.tab || 'docs'; render();
  });
  // E5 — tap an element to reveal the plain-language "why this matters"
  bodyEl.querySelectorAll('.sp-el-top').forEach(btn => btn.onclick = () => {
    const why = btn.parentElement.querySelector('.sp-el-why');
    const open = !why.hidden;
    why.hidden = open;
    btn.setAttribute('aria-expanded', String(!open));
    btn.classList.toggle('open', !open);
  });
  // manual chase tick (R3)
  bodyEl.querySelectorAll('input[data-ch]').forEach(inp => inp.onchange = async () => {
    const ch = (c.chase || []).find(x => x.id === inp.dataset.ch);
    if (ch) { ch.done = inp.checked; ch.doneAt = inp.checked ? Date.now() : null; }
    await window.CaseStrength.refresh(c);
    renderStrengthPanel(panel, c);
    toast(inp.checked ? 'Marked obtained \u2014 case strength updated.' : 'Moved back to the chase list.');
  });
}
