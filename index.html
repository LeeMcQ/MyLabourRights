   ------------------------------------------------------------ */
async function tabChat(body, c) {
  const wrap = el(`<div class="tabview on" style="margin:-26px"></div>`);

  // ── Lee identity header ──────────────────────────────────────
  const leeHdr = el(`<div class="lee-hdr">
    <div class="lee-av" aria-hidden="true">L</div>
    <div>
      <div class="lee-name">Lee</div>
      <div class="lee-role">${t('lee_role') || 'AI Labour-Law Advisor \u00b7 Preparation guidance only'}</div>
    </div>
    <div class="lee-online">Online</div>
  </div>`);
  wrap.appendChild(leeHdr);

  // ── Lee context panel (what the AI knows) ────────────────────
  if (c && (c.disputeKey || c.incidentDate)) {
    const dl = (c.disputeKey && c.incidentDate && window.Deadline)
      ? window.Deadline.compute(c.disputeKey, c.incidentDate) : null;
    const ctxEl = el(`<details class="lee-ctx">
      <summary>${t('ctx_title') || '\u25b8 What Lee knows about your case'}</summary>
      ${c.disputeKey ? `<div class="lee-ctx-row"><span class="lee-ctx-key">${t('ctx_dispute') || 'Dispute'}</span><span class="lee-ctx-val">${esc(c.disputeKey.replace(/_/g,' '))}</span></div>` : ''}
      ${c.incidentDate ? `<div class="lee-ctx-row"><span class="lee-ctx-key">${t('ctx_date') || 'Incident date'}</span><span class="lee-ctx-val">${esc(c.incidentDate)}</span></div>` : ''}
      ${dl ? `<div class="lee-ctx-row"><span class="lee-ctx-key">${t('ctx_deadline') || 'Deadline'}</span><span class="lee-ctx-val">${dl.status === 'missed' ? 'Deadline passed' : dl.daysLeft + ' days remaining'}</span></div>` : ''}
      <div class="lee-ctx-row"><span class="lee-ctx-key">${t('ctx_docs') || 'Documents'}</span><span class="lee-ctx-val">${c.docCount || 0} on file</span></div>
    </details>`);
    wrap.appendChild(ctxEl);
  }

  // ── Screen reader live region ─────────────────────────────────
  if (!document.getElementById('lee-live')) {
    const lr = document.createElement('div');
    lr.id = 'lee-live'; lr.setAttribute('aria-live','polite');
    lr.setAttribute('aria-atomic','false'); lr.setAttribute('aria-relevant','additions');
    lr.style.cssText = 'position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0;';
    document.body.appendChild(lr);
  }

  // ── Chat UI ───────────────────────────────────────────────────
  const chatDiv = el(`<div class="chat-wrap">
    <div class="chat-scroll" id="chatScroll" role="log" aria-live="off" aria-label="Conversation with Lee, your AI advisor"></div>
    <div class="chat-input-bar">
      <div class="chat-quota" id="chatQuota"></div>
      <div id="voiceStatus" class="voice-status" role="status" aria-live="assertive"></div>
      <div class="chat-input-row">
        <textarea id="chatInput" rows="1" placeholder="Type your message to Lee\u2026" aria-label="Type your message to Lee, your AI advisor"></textarea>
        <button class="chat-action mic" id="chatAction" aria-label="Hold to talk">${ICONS.mic}</button>
        <button class="chat-voicemode" id="voiceModeBtn" aria-label="Voice options">${ICONS.phone}</button>
      </div>
      <div class="voice-modes" id="voiceModes" hidden>
        <button class="vmode-btn" data-mode="ptt">${ICONS.mic} Push to talk</button>
        <button class="vmode-btn" data-mode="hands">${ICONS.phone} Hands-free call</button>
      </div>
    </div>
  </div>`);
  wrap.appendChild(chatDiv);
  body.appendChild(wrap);

  const scroll = wrap.querySelector('#chatScroll');
  const input = wrap.querySelector('#chatInput');
  const actionBtn = wrap.querySelector('#chatAction');   // D1 — morphs mic <-> send
  const voiceModeBtn = wrap.querySelector('#voiceModeBtn');
  const vStatus = wrap.querySelector('#voiceStatus');
  // keep references the rest of the code expects
  const sendBtn = actionBtn;
  const micBtn = actionBtn;

  const msgs = await DB.byIndex('messages', 'caseId', c.id);
  msgs.sort((a, b) => a.ts - b.ts);
  // D3 — trauma-aware: a gentle, calm opener for sensitive matters
  if (window.CrossExam && window.CrossExam.isSensitive(c.disputeKey, c)) {
    scroll.appendChild(el(`<div class="chat-trauma">${ICONS.shield}
      <span>Take this at your own pace \u2014 you can pause or stop any time. Share only what you're comfortable with; we'll go one step at a time.</span></div>`));
  }
  msgs.forEach(m => scroll.appendChild(renderMsg(m, c)));
  refreshQuota(wrap, c);
  scroll.scrollTop = scroll.scrollHeight;

  // D1 — the trailing button shows a mic when empty, a send arrow when typing
  function syncAction() {
    const typing = input.value.trim().length > 0;
    actionBtn.classList.toggle('mic', !typing);
    actionBtn.classList.toggle('send', typing);
    actionBtn.innerHTML = typing ? ICONS.send : ICONS.mic;
    actionBtn.setAttribute('aria-label', typing ? 'Send message' : 'Hold to talk');
    voiceModeBtn.hidden = typing;          // hide voice options while composing
  }
  syncAction();

  // D6 — auto-grow textarea up to ~5 lines, then scroll
  input.oninput = () => {
    input.style.height = 'auto';
    input.style.height = Math.min(140, input.scrollHeight) + 'px';
    syncAction();
  };
  input.onkeydown = (e) => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); doSend(); }
  };
  // D1 — tap action: send if typing, else (handled by voice setup) push-to-talk
  actionBtn.onclick = (e) => {
    if (actionBtn.classList.contains('send')) { doSend(); }
    // when in mic mode, setupVoice binds press-and-hold below; a plain tap primes it
  };
  // D1 — single voice-options button reveals the two modes
  voiceModeBtn.onclick = () => {
    const m = wrap.querySelector('#voiceModes');
    m.hidden = !m.hidden;
  };

  /* ---------- VOICE ---------- */
  setupVoice({ wrap, scroll, micBtn, vStatus, input, c, doSend, getCase: () => c });

  async function doSend(opts = {}) {
    const text = input.value.trim();
    if (!text) return null;

    if (Quota.expired(c)) { openPaywall(c); return null; }
    const ok = await Quota.consume(c);
    if (!ok) { openQuotaWall(c); return null; }

    // user message (flag if it came from voice)
    const um = {
      id: uid('msg'), caseId: c.id, role: 'me', ts: Date.now(), text,
      viaVoice: !!opts.viaVoice,
    };
    await DB.put('messages', um);
    scroll.appendChild(renderMsg(um, c));
    input.value = ''; input.style.height = 'auto'; syncAction();
    scroll.scrollTop = scroll.scrollHeight;

    // R5: extract structured facts from every message (typed or spoken) so
    // the chat genuinely feeds the case file
    {
      const extracted = NoteExtractor.extract(text);
      let tlAdded = 0;
      for (const n of extracted) {
        await DB.put('notes', {
          id: uid('note'), caseId: c.id, ts: Date.now(),
          text: n.text, tag: n.tag, why: n.why,
          source: opts.viaVoice ? 'voice' : 'chat', confirmed: false,
        });
        // Timeline-tagged facts become draft chronology entries (deduped)
        if (n.tag === 'Timeline') {
          const existing = await DB.byIndex('timeline', 'caseId', c.id);
          const stub = n.text.slice(0, 60).toLowerCase();
          if (!existing.some(ev => (ev.text || '').toLowerCase().startsWith(stub))) {
            await DB.put('timeline', {
              id: uid('tl'), caseId: c.id, order: existing.length,
              date: 'Date to confirm', title: n.text.slice(0, 48), text: n.text,
              edited: false, fromChat: true,
            });
            tlAdded++;
          }
        }
      }
      if (extracted.length) {
        toast(extracted.length + ' case note' + (extracted.length > 1 ? 's' : '') +
          (tlAdded ? ' + ' + tlAdded + ' timeline event' + (tlAdded > 1 ? 's' : '') : '') +
          ' captured \u2014 review in Case Notes' + (tlAdded ? ' and Timeline' : '') + '.', 'mic');
      }
    }

    // typing indicator
    const typing = el(`<div class="chat-msg ai"><div class="chat-av ai">AI</div>
      <div class="chat-bubble"><div class="chat-typing"><span></span><span></span><span></span></div></div></div>`);
    scroll.appendChild(typing);
    scroll.scrollTop = scroll.scrollHeight;

    // Real dual-AI via Backend; auto-falls back to CaseEngine simulation
    let turn;
    if (window.Backend) {
      turn = await Backend.ai(c, text);
    } else {
      turn = await new Promise(res =>
        setTimeout(async () => res(await CaseEngine.respond(c, text)), 850 + Math.random() * 700));
    }
    typing.remove();

    // persist + update case
    if (turn.successRate != null) c.successRate = turn.successRate;
    if (c.status === 'Intake' && (c.answeredFollowUps || 0) >= 2) c.status = 'Building case';
    await DB.put('cases', c);
    // R1: re-assess the central case-strength model with the new information
    try { await window.CaseStrength.refresh(c); } catch {}

    const am = {
      id: uid('msg'), caseId: c.id, role: 'ai', ts: Date.now(),
      kind: turn.kind, text: turn.text, followUp: turn.followUp,
      evidence: turn.evidence, successRate: turn.successRate,
      validity: turn.validity, offTopic: turn.offTopic,
      escalate: turn.escalate || null,
    };
    await DB.put('messages', am);
    am._fresh = true;                 // D2 — animate only this newly-arrived reply
    scroll.appendChild(renderMsg(am, c));
    refreshQuota(wrap, c);
    scroll.scrollTop = scroll.scrollHeight;

    // off-topic 2nd strike -> offer new case
    if (turn.kind === 'redirect' && turn.offTopic) {
      const cta = el(`<div class="chat-msg ai"><div class="chat-av ai">AI</div>
        <div class="chat-bubble" style="background:var(--paper-2)">
          <button class="btn btn-gold btn-sm" id="otNew">Open a new case (7-day free trial)</button>
        </div></div>`);
      scroll.appendChild(cta);
      cta.querySelector('#otNew').onclick = () => Views.openNewCaseModal(false);
      scroll.scrollTop = scroll.scrollHeight;
    }

    // refresh sidebar stats silently
    State.cases = await DB.byIndex('cases', 'userId', State.user.id);
    return turn;
  }
}

/* ============================================================
   VOICE SETUP — push-to-talk + hands-free, wired to the chat
   ============================================================ */
function setupVoice({ wrap, scroll, micBtn, vStatus, input, doSend, getCase }) {
  const modesBox = wrap.querySelector('#voiceModes');
  let mode = 'ptt';          // 'ptt' or 'hands'
  let active = false;        // currently in a voice exchange
  let handsLoop = false;     // hands-free conversation running

  if (!Voice.supported()) {
    // D1 — keep the action button (it still sends); only hide voice-only controls
    const vmBtn = wrap.querySelector('#voiceModeBtn');
    if (vmBtn) vmBtn.style.display = 'none';
    modesBox.style.display = 'none';
    micBtn.onclick = () => doSend();   // no voice → button is send-only
    return;
  }

  // mode buttons
  modesBox.querySelectorAll('.vmode-btn').forEach(b => {
    if (b.dataset.mode === mode) b.classList.add('on');
    b.onclick = () => {
      modesBox.querySelectorAll('.vmode-btn').forEach(x => x.classList.remove('on'));
      b.classList.add('on');
      mode = b.dataset.mode;
    };
  });

  function setStatus(html, kind = '') {
    vStatus.className = 'voice-status' + (kind ? ' ' + kind : '');
    vStatus.innerHTML = html;
  }
  function clearStatus() { vStatus.className = 'voice-status'; vStatus.innerHTML = ''; }

  /* ---- a single listen->send cycle ---- */
  function listenOnce() {
    active = true;
    micBtn.classList.add('listening');
    setStatus(`${ICONS.mic} Listening... speak now`, 'listening');

    Voice.listen({
      interim: (txt) => {
        input.value = txt;
        input.style.height = 'auto';
        input.style.height = Math.min(120, input.scrollHeight) + 'px';
      },
      final: (txt) => { input.value = txt; },
      error: (e) => {
        micBtn.classList.remove('listening');
        active = false; handsLoop = false;
        if (e === 'not-allowed' || e === 'service-not-allowed')
          setStatus('Microphone blocked. Allow mic access in your browser settings.', 'err');
        else if (e === 'no-speech')
          setStatus('Didn\u2019t catch that \u2014 tap the mic to try again.', 'err');
        else setStatus('Voice unavailable right now \u2014 you can type instead.', 'err');
        setTimeout(clearStatus, 4000);
      },
      end: async (finalText) => {
        micBtn.classList.remove('listening');
        if (!finalText) {
          active = false; handsLoop = false;
          clearStatus();
          return;
        }
        setStatus(`${ICONS.spark} Thinking about what you said...`, '');
        // send, flagged as voice so notes get extracted
        const turn = await doSend({ viaVoice: true });
        active = false;
        clearStatus();

        // speak the reply back
        if (turn && turn.text) {
          let speakText = turn.text;
          if (turn.followUp) speakText += '. ' + turn.followUp;
          if (mode === 'hands' && handsLoop) {
            setStatus(`${ICONS.phone} AI is speaking...`, '');
            Voice.speak(speakText, () => {
              // hands-free: after speaking, listen again
              if (handsLoop && getCase()) {
                setTimeout(() => { if (handsLoop) listenOnce(); }, 350);
              } else clearStatus();
            });
          } else {
            // push-to-talk: speak once, then stop
            setStatus(`${ICONS.phone} Reading the reply aloud...`, '');
            Voice.speak(speakText, clearStatus);
          }
        }
      },
    });
  }

  /* ---- mic button ---- */
  micBtn.onclick = () => {
    // D1 — when the button has morphed into "send" (user is typing), send instead
    if (micBtn.classList.contains('send')) { doSend(); return; }
    // tap while listening = stop
    if (active || Voice.isListening()) {
      Voice.stop(); Voice.shutUp();
      handsLoop = false; active = false;
      micBtn.classList.remove('listening');
      clearStatus();
      return;
    }
    // tap while AI is speaking = interrupt
    Voice.shutUp();

    if (mode === 'hands') {
      handsLoop = true;
      setStatus(`${ICONS.phone} Hands-free call started \u2014 tap mic to end`, '');
      setTimeout(listenOnce, 400);
    } else {
      handsLoop = false;
      listenOnce();
    }
  };
}

function renderMsg(m, c) {
  if (m.role === 'me') {
    const voiceBadge = m.viaVoice
      ? `<span class="voice-badge">${ICONS.mic} spoken</span>` : '';
    return el(`<div class="chat-msg me">
      <div class="chat-av me">${(State.user.name || '?')[0].toUpperCase()}</div>
      <div class="chat-bubble">${voiceBadge}${fmt(m.text)}</div></div>`);
  }
  // AI message
  const tagMap = {
    followup: ['tag-followup', 'Follow-up question'],
    rapport: ['tag-rapport', 'Building trust'],
    pitfall: ['tag-pitfall', 'Pitfall warning'],
    redirect: ['tag-pitfall', 'Case scope'],
  };
  let inner = '';
  if (m.kind && tagMap[m.kind])
    inner += `<span class="chat-tag ${tagMap[m.kind][0]}">${tagMap[m.kind][1]}</span>`;
  inner += `<div class="sender">Lee \u00b7 AI Labour-Law Advisor</div>`;
  inner += fmt(m.text);

  // follow-up question highlighted
  if (m.followUp) {
    inner += `<div style="margin-top:8px;padding:10px 12px;background:var(--paper-2);
      border-left:3px solid var(--gold);border-radius:8px;font-size:var(--fs-base)">
      <strong>${esc(m.followUp)}</strong></div>`;
  }

  // validity note
  if (m.validity) {
    inner += `<div style="margin-top:8px;font-size:var(--fs-sm);color:var(--moss);display:flex;gap:6px;align-items:center">
      ${ICONS.shield}<span>${esc(m.validity)}</span></div>`;
  }

  // S14: escalation flag — this matter needs a human lawyer
  if (m.escalate) {
    const reasonText = {
      'discrimination': 'discrimination matters are doctrinally complex and often go to the Labour Court',
      'harassment': 'harassment matters need sensitive, specialised handling',
      'retirement-age dismissal': 'retirement-age dismissals are a legally unsettled, high-risk area',
      'review': 'reviews turn on narrow legal tests and strict time limits',
      'Labour Court': 'Labour Court matters need a qualified legal practitioner',
      'collective dispute': 'collective and strike matters involve specialised collective-labour law',
      'automatically-unfair dismissal': 'automatically-unfair dismissals (like pregnancy, whistleblowing or union activity) carry special protection and higher stakes',
      'constructive dismissal': 'constructive dismissal turns on a difficult legal test about whether you truly had no choice',
      'union/industrial action': 'union, strike and interdict matters involve specialised collective-labour law',
    }[m.escalate] || 'this matter is legally complex';
    // D4 — warm, supportive hand-off (not a dead end): explain + offer matched firms
    inner += `<div class="escalate-flag handoff">
      ${ICONS.scale}
      <div class="handoff-body">
        <strong>This one deserves a human lawyer beside you.</strong>
        <span>I\u2019ll keep helping you prepare \u2014 but ${reasonText}, so a qualified labour attorney should look at this with you. I can point you to firms matched to your matter.</span>
        <button class="btn btn-forest btn-sm handoff-go" data-go="firms">${ICONS.building} See matched firms</button>
      </div>
    </div>`;
  }

  // evidence-strengthen block
  if (m.evidence && m.evidence.length) {
    inner += `<div class="evidence-prompt">
      <div class="ep-title">${ICONS.upload} Strengthen your case \u2014 evidence that would help:</div>
      ${m.evidence.map((ev, i) => `
        <div class="evidence-item" data-ev="${i}">
          <div><strong>${esc(ev.label)}</strong><br>
            <span class="txt-muted" style="font-size:var(--fs-sm)">${esc(ev.why)}</span></div>
          <div class="ei-actions">
            <button class="mini-btn up" data-act="up">Upload</button>
            <button class="mini-btn na" data-act="na">Not available</button>
          </div>
        </div>`).join('')}
    </div>`;
  }

  const node = el(`<div class="chat-msg ai"><div class="chat-av ai">AI</div>
    <div class="chat-bubble">${inner}</div></div>`);

  // wire evidence buttons
  node.querySelectorAll('.evidence-item').forEach(item => {
    item.querySelectorAll('.mini-btn').forEach(btn => {
      btn.onclick = () => {
        const act = btn.dataset.act;
        const actions = item.querySelector('.ei-actions');
        if (act === 'up') {
          State.tab = 'docs';
          sessionStorage.setItem('cg_jump_upload', '1');
          render();
        } else {
          actions.innerHTML = `<span class="mini-btn done">${ICONS.check} Noted</span>`;
        }
      };
    });
  });
  // D4 — hand-off button jumps to the matched firms
  const handoffGo = node.querySelector('.handoff-go');
  if (handoffGo) handoffGo.onclick = () => { State.tab = 'firms'; render(); };

  // D2 — staged reveal of long AI replies (calmer than a wall of text).
  // Respects reduced-motion (renders instantly). Only for fresh, long AI text.
  if (m.role === 'ai' && m._fresh && m.text && m.text.length > 280) {
    const reduce = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    if (!reduce) {
      const bubble = node.querySelector('.chat-bubble');
      const paras = [...bubble.querySelectorAll('p')];
      if (paras.length > 1) {
        paras.forEach((p, i) => {
          if (i === 0) return;
          p.style.opacity = '0';
          p.style.transition = 'opacity var(--dur) var(--ease)';
        });
        paras.forEach((p, i) => {
          if (i === 0) return;
          setTimeout(() => { p.style.opacity = '1'; }, i * 260);
        });
      }
    }
  }
  return node;
}

function refreshQuota(wrap, c) {
  const q = Quota.status(c);
  const box = wrap.querySelector('#chatQuota');
  if (!box) return;
  // D1 — keep the input calm: only surface quota when it actually matters
  if (q.unlimited) { box.hidden = true; box.innerHTML = ''; return; }
  if (q.left > 2) { box.hidden = true; box.innerHTML = ''; return; }
  box.hidden = false;
  const dots = Array.from({ length: q.limit }, (_, i) =>

/* AI prioritisation — keyword-weighted importance score */
function scoreDoc(name) {
  const n = name.toLowerCase();
  const weights = [
    [/(dismiss|terminat|retrench|afdank)/, 100],
    [/(contract|kontrak|agreement|appointment)/, 90],
    [/(warning|hearing|disciplin|verhoor)/, 85],
    [/(payslip|salary|wage|loon|salaris)/, 75],
    [/(ccma|referral|lra)/, 80],
    [/(email|whatsapp|letter|brief)/, 60],
    [/(statement|bank)/, 55],
  ];
  for (const [re, w] of weights) if (re.test(n)) return w;
  return 35;
}

/* ============================================================
   F3 — in-app file size reduction
   Images: downscaled + re-encoded client-side (canvas) before storing.
   PDFs: can't be re-compressed reliably in-browser, so we guard the
   size and offer iLovePDF as an honest fallback for big ones.
   ============================================================ */
const FileCompress = {
  MAX_IMG_DIM: 1600,          // longest edge after downscale
  IMG_QUALITY: 0.72,          // JPEG quality
  WARN_BYTES: 5 * 1024 * 1024,   // warn above 5MB
  HARD_BYTES: 15 * 1024 * 1024,  // refuse above 15MB

  async image(file) {
    // returns { blob, dataUrl, width, height } or null on failure
    const dataUrl = await new Promise(res => {
      const r = new FileReader(); r.onload = () => res(r.result); r.onerror = () => res(null);
      r.readAsDataURL(file);
    });
    if (!dataUrl) return null;
    const img = await new Promise(res => {
      const i = new Image(); i.onload = () => res(i); i.onerror = () => res(null); i.src = dataUrl;
    });
    if (!img) return { blob: file, dataUrl };
    let { width, height } = img;
    const longest = Math.max(width, height);
    if (longest > this.MAX_IMG_DIM) {
      const scale = this.MAX_IMG_DIM / longest;
      width = Math.round(width * scale); height = Math.round(height * scale);
    }
    const canvas = document.createElement('canvas');
    canvas.width = width; canvas.height = height;
    const ctx = canvas.getContext('2d');
    ctx.drawImage(img, 0, 0, width, height);
    const blob = await new Promise(res => canvas.toBlob(res, 'image/jpeg', this.IMG_QUALITY));
    if (!blob) return { blob: file, dataUrl };
    const outUrl = await new Promise(res => {
      const r = new FileReader(); r.onload = () => res(r.result); r.readAsDataURL(blob);
    });
    return { blob, dataUrl: outUrl, width, height };
  },

  // PDF: we can't recompress reliably in the browser. Decide what to tell the user.
  pdfAdvice(file) {
    if (file.size > this.HARD_BYTES)
      return { ok: false, reason: 'too-big',
        msg: 'This PDF is large (' + this.mb(file.size) + 'MB). Please shrink it first, then upload.' };
    if (file.size > this.WARN_BYTES)
      return { ok: true, reason: 'warn',
        msg: 'This PDF is fairly large (' + this.mb(file.size) + 'MB). You can upload it, or shrink it first to save space.' };
    return { ok: true, reason: 'fine', msg: '' };
  },

  mb(bytes) { return (bytes / 1048576).toFixed(1); },
};
window.FileCompress = FileCompress;

/* F3 — small modal offering iLovePDF as a fallback for large PDFs */
function offerPdfShrink(file, onProceed) {
  const a = FileCompress.pdfAdvice(file);
  const node = el(`
    <div class="modal">
      <div class="modal-head"><h3>${ICONS.doc} Large PDF</h3>
        <button aria-label="Close" class="modal-close" id="pdfX">${ICONS.x}</button></div>
      <div class="modal-body">
        <p class="txt-sm" style="color:var(--text-soft);line-height:var(--lh-body)">${esc(a.msg)}</p>
        <p class="txt-sm" style="color:var(--text-mute);margin-top:8px">PDFs can\u2019t be safely compressed inside the app without risking the text, so for big files we recommend a quick free shrink:</p>
        <div class="flex gap8 mt16" style="flex-wrap:wrap">
          <a class="btn btn-gold btn-sm" href="https://www.ilovepdf.com/compress_pdf" target="_blank" rel="noopener">Shrink on iLovePDF \u2197</a>
          ${a.ok ? `<button class="btn btn-ghost btn-sm" id="pdfAnyway">Upload as-is</button>` : ''}
        </div>
        <p class="txt-xs" style="color:var(--text-mute);margin-top:12px">iLovePDF is a separate free service \u2014 your file goes to them, not to us. Download the smaller PDF, then upload it here.</p>
      </div>
    </div>`);
  node.querySelector('#pdfX').onclick = Modal.close;
  const anyway = node.querySelector('#pdfAnyway');
  if (anyway) anyway.onclick = () => { Modal.close(); onProceed(); };
  Modal.open(node);
}

async function addDoc(c, file) {
  const score = scoreDoc(file.name);
  const isImg = file.type.startsWith('image/');
  const isPdf = file.type === 'application/pdf' || /\.pdf$/i.test(file.name);
  let thumb = null;
  let storedSize = file.size;

  // F3 — large PDF: offer iLovePDF / size guard before storing
  if (isPdf) {
    const advice = FileCompress.pdfAdvice(file);
    if (!advice.ok) {              // too big — must shrink first
      offerPdfShrink(file, () => {});
      return;
    }
    if (advice.reason === 'warn') {
      // let them choose; if they cancel we stop, if they proceed we continue below
      const proceed = await new Promise(res => {
        offerPdfShrink(file, () => res(true));
        // closing the modal without choosing = cancel
        const obs = setInterval(() => {
          if (!document.querySelector('.modal-backdrop, .modal')) { clearInterval(obs); res(false); }
        }, 300);
      });
      if (!proceed) return;
    }
  }

  // F3 — images: downscale + re-encode to save space, keep a thumbnail
  if (isImg) {
    const out = await FileCompress.image(file);
    if (out) {
      thumb = out.dataUrl;
      storedSize = out.blob ? out.blob.size : file.size;
      if (out.blob && out.blob.size < file.size) {
        toast('Photo optimised \u2014 ' + FileCompress.mb(file.size) + 'MB \u2192 ' + FileCompress.mb(out.blob.size) + 'MB.', 'mic');
      }
    } else {
      thumb = await new Promise(res => {
        const r = new FileReader(); r.onload = () => res(r.result); r.readAsDataURL(file);
      });
    }
  }

  // F2/F3 — warn if storage is getting full before we write
  try {
    const u = await DB.usage();
    if (u.ratio > 0.8) toast('Your device storage is getting full \u2014 consider exporting and clearing old cases.', 'alert');
  } catch {}

  const doc = {
    id: uid('doc'), caseId: c.id,
    name: file.name, size: storedSize, type: file.type || 'file',
    isImage: isImg, thumb, score,
    uploadedAt: Date.now(),
  };
  try {
    await safeWrite('documents', doc, 'your document');
  } catch { return; }            // F2 — fail loud, don't pretend it saved
  c.docCount = (await DB.byIndex('documents', 'caseId', c.id)).length;
  // R3: does this upload satisfy anything on the evidence-to-chase list?
  const matched = window.Chase.autoMatch(c, file.name);
  if (matched.length) {
    toast('Obtained: ' + matched[0] + (matched.length > 1 ? ' (+' + (matched.length - 1) + ' more)' : '') + ' \u2014 case strength updated.');
  }
  // R1: re-assess the central strength model (replaces the old flat +4 nudge)
  await window.CaseStrength.refresh(c);
}

        <button aria-label="Close" class="modal-close" id="teClose">${ICONS.x}</button></div>
      <div class="modal-body">
        <div class="field"><label>When</label>
          <input id="teDate" placeholder="e.g. 14 March 2026" value="${esc(item?.date || '')}"></div>
        <div class="field"><label>Event title</label>
          <input id="teTitle" placeholder="e.g. Disciplinary hearing held" value="${esc(item?.title || '')}"></div>
        <div class="field"><label>What happened</label>
          <textarea id="teText" placeholder="Describe this event...">${esc(item?.text || '')}</textarea></div>
        ${docs.length ? `<div class="field"><label>Link evidence (optional)</label>
          <select id="teDoc"><option value="">\u2014 no document linked \u2014</option>
            ${docs.map(d => `<option value="${esc(d.name)}" ${item?.docName === d.name ? 'selected' : ''}>${esc(d.name)}</option>`).join('')}
          </select></div>` : ''}
        <button class="btn btn-primary btn-block" id="teSave">Save event</button>
      </div>
    </div>`);
  node.querySelector('#teClose').onclick = Modal.close;
  node.querySelector('#teSave').onclick = async () => {
    const date = node.querySelector('#teDate').value.trim();
    const title = node.querySelector('#teTitle').value.trim();
    const text = node.querySelector('#teText').value.trim();
    const docName = node.querySelector('#teDoc') ? node.querySelector('#teDoc').value : (item?.docName || '');
    if (!title) { toast('Give the event a title.', 'alert'); return; }
    if (isNew) {
      const count = (await DB.byIndex('timeline', 'caseId', c.id)).length;
      await DB.put('timeline', {
        id: uid('tl'), caseId: c.id, order: count,
        date: date || 'Date unknown', title, text, edited: true,
        docName: docName || null,
      });
    } else {
      item.date = date || item.date; item.title = title; item.text = text; item.edited = true;
      item.docName = docName || null;
      await DB.put('timeline', item);
    }
    Modal.close();
    await paintTimeline(tlBody, c);
    toast('Timeline updated.');
  };
  Modal.open(node);
}

/* ---- S13: bundle readiness checklist ---- */
function renderBundleList(host, c) {
  if (!host) return;
  const sections = window.Bundle.sections(c);
  host.innerHTML = sections.map(s => `
    <div class="bundle-item ${s.done ? 'done' : ''}">
      <span class="bundle-tick">${s.done ? ICONS.check : ''}</span>
      <div><strong>${s.label}</strong><span>${s.detail}</span></div>
    </div>`).join('');
}

/* ---- S8: issue matrix rows ---- */
function renderIssueRows(host, c) {
  if (!host) return;
  if (!c.issueRows || !c.issueRows.length) {
    // seed from dispute type the first time
    c.issueRows = c.disputeKey ? window.IssueMatrix.seed(c.disputeKey) : [window.IssueMatrix.blankRow()];
  }
  host.innerHTML = c.issueRows.map((row, i) => `
    <div class="issue-row" data-i="${i}">
      <div class="issue-head">
        <input class="issue-alleg" data-f="allegation" placeholder="What happened (your allegation)" value="${esc(row.allegation || '')}" />
        <button aria-label="Remove issue" class="issue-del" data-i="${i}" title="Remove">${ICONS.x}</button>
      </div>
      <div class="issue-fields">
        <label>What proves it?<input data-f="support" placeholder="Document, email, payslip\u2026" value="${esc(row.support || '')}" /></label>
        <label>Who saw it?<input data-f="witness" placeholder="Witness name / role" value="${esc(row.witness || '')}" /></label>
        <label class="issue-weak">The weakness<input data-f="weakness" placeholder="What the other side will say" value="${esc(row.weakness || '')}" /></label>
      </div>
    </div>`).join('');

  const save = async () => { try { await DB.put('cases', c); } catch (e) {} };
  host.querySelectorAll('.issue-row').forEach(rowEl => {
    const i = +rowEl.dataset.i;
    rowEl.querySelectorAll('input').forEach(inp => {
      inp.onchange = () => { c.issueRows[i][inp.dataset.f] = inp.value; save(); };
    });
    rowEl.querySelector('.issue-del').onclick = async () => {
      c.issueRows.splice(i, 1);
      if (!c.issueRows.length) c.issueRows.push(window.IssueMatrix.blankRow());
      await save();
      renderIssueRows(host, c);
    };
  });
  save();
}

/* ---- S11: settlement prep ---- */
function renderSettlement(host, c) {
  if (!host) return;
  const heads = window.Settlement.heads();
  c.settlementPicked = c.settlementPicked || [];
  host.innerHTML = `
    <div class="settle-frame">${ICONS.scale}<p>${window.Settlement.framing(c.successRate)}</p></div>
    <p class="txt-sm txt-muted" style="margin:14px 0 10px">Tick what you\u2019d want on the table. Knowing this <em>before</em> you walk into conciliation is half the battle.</p>
    <div class="settle-heads">
      ${heads.map(h => `
        <button class="settle-head ${c.settlementPicked.includes(h.key) ? 'on' : ''}" data-k="${h.key}">
          <span class="sh-tick">${c.settlementPicked.includes(h.key) ? ICONS.check : ''}</span>

        </button>`).join('')}
    </div>`;
  host.querySelectorAll('.settle-head').forEach(b => b.onclick = async () => {

    [ICONS.clock, 'Next-steps action plan', 'Your options at each stage and what the employer may do next.', 'plan'],
    [ICONS.chat, 'Mock cross-examination', 'Practise the hostile questions the other side will ask \u2014 at your own pace.', 'crossexam'],

        <div class="action-grid">

                <h4>${h}</h4><p>${p}</p>

              </div>
            </div>`).join('')}
        </div>
      </div>
    </div>`;
  body.appendChild(wrap);

  // R6: nudge a re-run of the analysis tools when the evidence has changed
  (async () => {
    try {
      const docs = await DB.byIndex('documents', 'caseId', c.id);
      if (!docs.length) return;
      const badge = (key, last) => {
        if (last && last.docCount === docs.length) return;
        const card = wrap.querySelector(`.action-card[data-action="${key}"]`);

/* ---- S12: render a 3-layer citation block as text ---- */
function citationBlock(c) {
  const cit = window.Citation.build(c.disputeKey, c.docCount, c.answeredFollowUps);
  const laws = cit.law.map(l => `  \u2022 ${l.law}: ${l.text}`).join('\n');

/* ---- S9 + S10: interactive mock cross-examination ---- */
function openCrossExam(c) {
  const sensitive = window.CrossExam.isSensitive(c.disputeKey, c);
  const questions = window.CrossExam.questions(c.disputeKey, c);
  let idx = 0;

  const node = el(`
    <div class="modal modal-lg">
      <div class="modal-head"><h3>${ICONS.chat} Mock cross-examination</h3>
        <button aria-label="Close" class="modal-close" id="ceClose">${ICONS.x}</button></div>
      <div class="modal-body" id="ceBody"></div>
    </div>`);

  function renderQ() {
    const total = questions.length;
    const q = questions[idx];
    const body = node.querySelector('#ceBody');
    if (idx >= total) {
      body.innerHTML = `
        <div class="ce-done">
          ${ICONS.check}
          <h4>That\u2019s the drill complete.</h4>
          <p>You\u2019ve faced ${total} of the hardest questions for this kind of matter. The goal isn\u2019t a perfect answer \u2014 it\u2019s to answer briefly, truthfully, and without volunteering. Practise the ones that felt shaky.</p>
          <button class="btn btn-primary btn-sm" id="ceRestart">Run it again</button>
          <button class="btn btn-ghost btn-sm" id="ceFinish">Done</button>
        </div>`;
      body.querySelector('#ceRestart').onclick = () => { idx = 0; renderQ(); };
      body.querySelector('#ceFinish').onclick = Modal.close;
      return;
    }
    body.innerHTML = `
      ${sensitive ? `<div class="ce-trauma">${ICONS.shield}<span>This matter may be sensitive. Take this at your own pace \u2014 you can pause or stop at any time. There are no wrong answers here; this is practice, in private.</span></div>` : ''}
      <div class="ce-progress">Question ${idx + 1} of ${total} \u00b7 testing: <strong>${esc(q.attacks)}</strong></div>
      <div class="ce-question">${ICONS.chat}<p>${esc(q.q)}</p></div>
      <label class="ce-label">Practise your answer (private \u2014 not saved unless you choose):</label>
      <textarea class="ce-answer" id="ceAns" placeholder="Keep it short, truthful, and only answer what was asked\u2026"></textarea>
      <div class="ce-tip">${ICONS.spark} Tip: a calm \u201cI don\u2019t recall the exact date, but I can check my records\u201d beats guessing.</div>
      <div class="flex gap8 mt12" style="flex-wrap:wrap">
        ${idx > 0 ? '<button class="btn btn-ghost btn-sm" id="cePrev">Back</button>' : ''}
        <button class="btn btn-primary btn-sm" id="ceNext">${idx === total - 1 ? 'Finish' : 'Next question'}</button>
        ${sensitive ? '<button class="btn btn-ghost btn-sm" id="cePause">Pause for now</button>' : ''}
      </div>`;
    body.querySelector('#ceNext').onclick = () => { idx++; renderQ(); };
    if (body.querySelector('#cePrev')) body.querySelector('#cePrev').onclick = () => { idx--; renderQ(); };
    if (body.querySelector('#cePause')) body.querySelector('#cePause').onclick = Modal.close;
  }

  node.querySelector('#ceClose').onclick = Modal.close;
  Modal.open(node);
  renderQ();
}

            <span class="cf-arrow">${ICONS.arrowRight || '\u2192'}</span>

      </div>`;
    body.querySelectorAll('.cf-pick').forEach(b => b.onclick = () => renderDraft(b.dataset.id));

  function renderDraft(formId) {
    const draft = window.CCMAForms.fill(formId, c, user);
    const body = node.querySelector('#cfBody');
    body.innerHTML = `
      <button class="btn btn-ghost btn-sm" id="cfBack">${ICONS.arrowLeft || '\u2190'} All forms</button>
      <textarea class="cf-draft" id="cfText" spellcheck="false">${esc(draft)}</textarea>

      <div class="flex gap8 mt12" style="flex-wrap:wrap">

/* ---- Evidence Bundle Organiser (professional documentation prompt) ---- */
async function openBundleOrganiser(c) {
  let docs = [];
  try { docs = await DB.byIndex('documents', 'caseId', c.id); } catch {}
  const node = el(`
    <div class="modal modal-lg">
      <div class="modal-head"><h3>${ICONS.list} Evidence bundle organiser</h3>
        <button aria-label="Close" class="modal-close" id="boClose">${ICONS.x}</button></div>
      <div class="modal-body" id="boBody"></div>
    </div>`);
  const body = node.querySelector('#boBody');

  if (!docs.length) {
    body.innerHTML = `
      <div class="pro-empty">${ICONS.doc}
        <h4>No documents on file yet</h4>
        <p>Upload your evidence in the <strong>Documents</strong> tab first \u2014 contract, payslips, emails, the referral, anything relevant. Then run the organiser and it will sort everything into a CCMA-ready bundle structure.</p>
        <button class="btn btn-primary btn-sm" id="boGoDocs">Go to Documents</button>
      </div>`;
    body.querySelector('#boGoDocs').onclick = () => { Modal.close(); State.tab = 'docs'; render(); };
    node.querySelector('#boClose').onclick = Modal.close;
    Modal.open(node);
    return;
  }

  const rows = window.BundleOrganiser.organise(docs, c);
  const index = window.BundleOrganiser.bundleIndex(rows);
  const top = index.slice(0, Math.min(10, index.length));
  const excluded = rows.filter(r => !r.include.startsWith('Yes'));
  const missing = window.BundleOrganiser.missing(rows, c);
  // R3: missing items become tracked chase tasks; R6: stamp this run
  const newChase = window.Chase.add(c, missing, 'bundle');
  c.lastBundleRun = { ts: Date.now(), docCount: docs.length };
  try { await DB.put('cases', c); } catch {}
  try { await window.CaseStrength.refresh(c); } catch {}
  if (newChase) toast(newChase + ' item' + (newChase > 1 ? 's' : '') + ' added to your evidence-to-chase list.');
  const SL = window.BundleOrganiser.SECTION_LABELS;

    <section class="pro-sec">

        ${top.map((r, i) => `
          <div class="pro-row strong-row">
            <span class="pro-num gold">${i + 1}</span>
            <div class="pro-row-body">
              <strong>${esc(r.name)}</strong>
              <span class="pro-meta">Proves: ${esc(r.issue)} \u00b7 Strength: <b class="str-${r.strength.toLowerCase().replace(/[^a-z]/g, '')}">${r.strength}</b></span>

    ${excluded.length ? `
    <section class="pro-sec">
      <h4>${ICONS.x} Output 3 \u2014 Keep out of the main bundle</h4>
      <p class="pro-sub">Duplicates and reserve items. They stay available \u2014 just not in front of the commissioner unless needed.</p>
      <div class="pro-list">
        ${excluded.map(r => `
          <div class="pro-row excl-row">
            <div class="pro-row-body">
              <strong>${esc(r.name)}</strong>
              <span class="pro-meta">${r.duplicateOf ? `Duplicate \u2014 stronger version retained: <em>${esc(r.duplicateOf)}</em>` : esc(r.include) + ' \u00b7 ' + esc(r.risk)}</span>
            </div>
          </div>`).join('')}
      </div>
    </section>` : ''}

    ${missing.length ? `
    <section class="pro-sec">
      <h4>${ICONS.clock} Output 4 \u2014 Missing evidence to chase</h4>
      <div class="pro-list">
        ${missing.map(m => `
          <div class="pro-row miss-row">
            <span class="pro-urgency u-${m.urgency.toLowerCase()}">${m.urgency}</span>
            <div class="pro-row-body">
              <strong>${esc(m.doc)}</strong>
              <span class="pro-meta">${esc(m.why)}</span>
              <span class="pro-meta"><b>How to get it:</b> ${esc(m.how)}</span>
            </div>
          </div>`).join('')}
      </div>
    </section>` : `<section class="pro-sec"><h4>${ICONS.check} No obvious evidence gaps</h4><p class="pro-sub">The core categories are covered on file names \u2014 still worth a human double-check against the missing-evidence checklist in your notes.</p></section>`}

    <section class="pro-sec">
      <h4>${ICONS.check} Final preparation checklist</h4>
      <ul class="pro-check">
        <li>Bundle paginated, with this index at the front</li>
        <li>Key pages highlighted or tabbed</li>
        <li>Proof of service attached at section 1</li>
        <li>Three copies: commissioner, employer, you</li>
        <li>Witnesses confirmed and told the date</li>
        <li>Financial calculation checked line by line</li>
        <li>Reserve documents brought along \u2014 but kept out of the main bundle</li>
      </ul>
    </section>

    <div class="flex gap8 mt12" style="flex-wrap:wrap">
      <button class="btn btn-primary btn-sm" id="boCopy">Copy bundle index</button>
      <button class="btn btn-ghost btn-sm" id="boDownload">Download as text</button>
    </div>`;

  const asText = () => {
    let t = 'CCMA MAIN BUNDLE INDEX \u2014 ' + (c.name || 'My case') + '\n';
    t += 'Generated by MyLabourRights. Verify every item before lodging.\n\n';
    index.forEach((r, i) => {
      t += `${i + 1}. ${r.newName}\n   (was: ${r.name})\n   ${SL[r.section]} \u00b7 ${r.issue} \u00b7 ${r.strength}\n`;
    });
    if (excluded.length) {
      t += '\nKEPT IN RESERVE / EXCLUDED:\n';
      excluded.forEach(r => { t += `\u2022 ${r.name} \u2014 ${r.duplicateOf ? 'duplicate of ' + r.duplicateOf : r.include}\n`; });
    }
    if (missing.length) {
      t += '\nMISSING EVIDENCE TO OBTAIN:\n';
      missing.forEach(m => { t += `\u2022 [${m.urgency}] ${m.doc} \u2014 ${m.how}\n`; });
    }
    return t;
  };
  body.querySelector('#boCopy').onclick = () =>
    navigator.clipboard?.writeText(asText()).then(() => toast('Bundle index copied.'), () => toast('Select and copy manually.'));
  body.querySelector('#boDownload').onclick = () => {
    const blob = new Blob([asText()], { type: 'text/plain' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob); a.download = 'ccma-bundle-index.txt';
    a.click(); URL.revokeObjectURL(a.href);
    toast('Bundle index downloaded.');
  };
  node.querySelector('#boClose').onclick = Modal.close;
  Modal.open(node);
}

/* ---- Employer Attack Analysis (employer-side attack prompt) ---- */
async function openEmployerAttack(c) {
  let docs = [];
  try { docs = await DB.byIndex('documents', 'caseId', c.id); } catch {}
  const a = window.EmployerAttack.analyse(c, docs);
  // R3: each unanswered attack becomes a concrete chase task; R6: stamp this run
  const GAP_DOCS = {
    jurisdiction: { doc: 'LRA 7.11 referral + proof of service', why: 'Closes the jurisdiction attack on day one.' },
    discretionary: { doc: 'Contract / policy clause showing the entitlement', why: 'Answers the \u201cit was discretionary\u201d attack.' },
    acquiescence: { doc: 'Your written objection or grievance', why: 'Defeats the \u201cyou accepted the change\u201d attack.' },
    delay: { doc: 'Proof of referral date (or condonation application)', why: 'Answers the \u201cyou delayed too long\u201d attack.' },
    'no-loss': { doc: 'Payslips / proof of deductions and a calculation', why: 'Answers the \u201cno actual loss\u201d attack.' },
    hearsay: { doc: 'Signed, dated witness statement', why: 'Answers the hearsay attack with direct evidence.' },
    internal: { doc: 'Grievance record and its outcome', why: 'Answers the \u201cinternal remedies not exhausted\u201d attack.' },
    operational: { doc: 'Employer correspondence showing the decision and its reason', why: 'Tests the \u201coperational reasons\u201d claim against their own words.' },
  };
  const gapItems = a.gaps.map(g => ({ ...(GAP_DOCS[g.key] || { doc: 'Evidence answering: ' + g.attack.slice(0, 50), why: g.attack }), urgency: 'High' }));
  const newChase = window.Chase.add(c, gapItems, 'attack');

    <section class="pro-sec">

      <div class="pro-list">
        ${a.matrix.map((m, i) => `
          <div class="ea-card ${m.strengthLabel === 'No evidence found' ? 'ea-gap' : ''}">
            <div class="ea-attack"><span class="pro-num red">${i + 1}</span><strong>${esc(m.attack)}</strong></div>
            <p class="ea-strongest">${esc(m.strongest)}</p>
            <div class="ea-defence">
              <span class="ea-lbl">Your evidence</span>
              ${m.evidence.length
                ? `<span>${m.evidence.map(e => esc(e)).join(' \u00b7 ')}</span>`

      <ul class="pro-check urgent-check">
        ${a.gaps.map(g => `<li><strong>${esc(g.attack)}</strong> \u2014 obtain evidence matching: ${esc(String(g.defendsWith).replace(/^\/|\/i$/g, '').replace(/\|/g, ', ').slice(0, 80))}</li>`).join('')}

  </style></head><body>

  <div class="row"><span class="lbl">Dispute</span> ${esc2((window.DISPUTE_TYPES && c.disputeKey && window.DISPUTE_TYPES[c.disputeKey] && window.DISPUTE_TYPES[c.disputeKey].label) || c.disputeKey || 'Not yet classified')}</div>
  ${dl ? `<div class="row"><span class="lbl">Incident date</span> ${esc2(dl.incidentDate)}</div>
  <div class="row"><span class="lbl">Referral deadline</span> ${esc2(dl.deadlineDate)} (${dl.daysLeft < 0 ? 'PASSED — condonation needed' : dl.daysLeft + ' days remaining'})</div>
  <div class="row"><span class="lbl">Basis</span> ${esc2(dl.basis)}</div>` : ''}
  ${c.desiredOutcome ? `<div class="row"><span class="lbl">Desired outcome</span> ${esc2(c.desiredOutcome)}</div>` : ''}
  ${s ? `<div class="row"><span class="lbl">Strength estimate</span> ${s.score}% (self-assessment, not legal advice)</div>` : ''}

  <table><tr><th>Element</th><th>Coverage</th></tr>
  ${s.elements.map(e => `<tr><td>${esc2(e.label)}</td><td>${Math.round(e.coverage * 100)}%</td></tr>`).join('')}</table>` : ''}

  <h2>Chronology</h2>
  ${tl.length ? `<table><tr><th>When</th><th>Event</th></tr>
  ${tl.map(ev => `<tr><td>${esc2(ev.date || 'Date unknown')}</td><td><strong>${esc2(ev.title || '')}</strong>${ev.text ? '<br>' + esc2(ev.text) : ''}${ev.docName ? '<br><span class="muted">Linked: ' + esc2(ev.docName) + '</span>' : ''}</td></tr>`).join('')}</table>`
  : '<p class="muted">No timeline events recorded yet.</p>'}

  <h2>Evidence index (${docs.length})</h2>
  ${docs.length ? `<table><tr><th>#</th><th>Document</th><th>Priority</th></tr>
  ${docs.slice().sort((a, b) => (b.score || 0) - (a.score || 0)).map((d, i) => `<tr><td>${i + 1}</td><td>${esc2(d.name)}</td><td>${(d.score || 0) >= 85 ? 'High' : (d.score || 0) >= 60 ? 'Medium' : 'Supporting'}</td></tr>`).join('')}</table>`
  : '<p class="muted">No documents uploaded yet.</p>'}

  ${notes.length ? `<h2>Case notes</h2>
  <table><tr><th>Tag</th><th>Note</th></tr>
  ${notes.map(n => `<tr><td><span class="pill">${esc2(n.tag || 'Note')}</span></td><td>${esc2(n.text || '')}</td></tr>`).join('')}</table>` : ''}

  <div class="disc"><strong>Important.</strong> This file was prepared by an individual using MyLabourRights, an AI-assisted preparation tool. It is not legal advice and was not drafted by an attorney. Strength estimates are self-assessments. For advice on this matter, consult a qualified South African labour-law practitioner.</div>
  </body></html>`;

  const w = window.open('', '_blank');
  if (!w) {
    const blob = new Blob([html], { type: 'text/html' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob); a.download = 'case-file.html'; a.click();
    URL.revokeObjectURL(a.href);
    toast('Case file downloaded \u2014 open it and print or save as PDF.');
    return;
  }
  w.document.write(html); w.document.close();
  setTimeout(() => { try { w.print(); } catch {} }, 400);
  toast('Case file ready \u2014 use your browser\u2019s "Save as PDF".');
}

function openPrivacySettings() {
  const u = State.user || {};
  u.consent = u.consent || window.Consent.defaults();
  const node = el(`
    <div class="modal modal-lg">
      <div class="modal-head"><h3>${ICONS.shield} Privacy &amp; settings</h3>
        <button aria-label="Close" class="modal-close" id="psClose">${ICONS.x}</button></div>
      <div class="modal-body">

        <section class="ps-sec">
          <h4>Appearance</h4>
          <p class="ps-sub">Choose how the app looks. "Auto" follows your phone's setting.</p>
          <div class="theme-toggle" id="themeToggle">
            <button data-theme="auto">Auto</button>
            <button data-theme="light">Light</button>
            <button data-theme="dark">Dark</button>
          </div>
        </section>

        <section class="ps-sec">
          <h4>Communication preferences</h4>
          <p class="ps-sub">Choose if and how we may contact you. Nothing is ticked by default \u2014 you decide. You can change this anytime. (POPIA s69)</p>
          <div id="psConsent"></div>
        </section>

        <section class="ps-sec">
          <h4>Your data</h4>
          <p class="ps-sub">Your case information is kept for <strong>${window.Privacy.retentionLabel}</strong>, then removed. You can take a copy or delete it now.</p>
          <div class="flex gap8" style="flex-wrap:wrap">
            <button class="btn btn-primary btn-sm" id="psCaseFile">${ICONS.doc} Printable case file</button>
            <button class="btn btn-ghost btn-sm" id="psExport">Download my data (JSON)</button>
            <button class="btn btn-ghost btn-sm" id="psDelete" style="color:var(--rust);border-color:var(--rust-soft)">Delete my data</button>
          </div>
          <div class="ps-backend">${ICONS.shield} <span>Account-level deletion from our servers is handled by our team under POPIA. This button clears the data stored on <strong>this device</strong>; to request full account erasure, use the contact page.</span></div>
        </section>

        <section class="ps-sec">
          <h4>Legal updates</h4>
          <p class="ps-sub">South African labour law changes. Here\u2019s what we\u2019ve kept current.</p>
          <ul class="ps-changelog">
            ${window.LEGAL_CHANGELOG.map(e => `<li><span class="cl-date">${e.date}</span><span class="cl-area">${e.area}</span><span class="cl-text">${esc(e.change)}</span></li>`).join('')}
          </ul>
        </section>

        <section class="ps-sec">
          <h4>Account</h4>
          <p class="ps-sub">Signed in as <strong>${esc(State.user.name || State.user.email || 'you')}</strong>.</p>
          <button class="btn btn-ghost btn-sm" id="psLogout">${ICONS.arrowLeft} Log out</button>
        </section>

      </div>
    </div>`);

  // logout from settings (works on mobile, where the sidebar is hidden)
  node.querySelector('#psLogout').onclick = async () => {
    await DB.put('meta', { key: 'session', userId: null });
    State.user = null; State.cases = []; State.activeCaseId = null;
    Modal.close();
    go('landing');
  };

  function renderConsent() {
    const host = node.querySelector('#psConsent');
    host.innerHTML = window.Consent.channels.map(ch => `
      <label class="ps-toggle">
        <input type="checkbox" data-k="${ch.key}" ${u.consent[ch.key] ? 'checked' : ''} />
        <span class="ps-toggle-body"><strong>${ch.label}</strong><span>${ch.note}</span></span>
      </label>`).join('');
    host.querySelectorAll('input').forEach(inp => inp.onchange = async () => {
      u.consent[inp.dataset.k] = inp.checked;
      u.consent.capturedAt = Date.now();
      try { await DB.put('users', u); } catch {}
      toast('Preference saved.');
      // NOTE: when a backend exists, also POST this consent record server-side
      // with a timestamp, for the POPIA-required proof of consent.
    });
  }

  node.querySelector('#psCaseFile').onclick = async () => {
    const c = activeCase();
    if (!c) { toast('Open a case first.', 'alert'); return; }
    await buildPrintableCaseFile(c);
  };
  node.querySelector('#psExport').onclick = async () => {
    const data = await window.Privacy.exportAll();
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'my-mylabourrights-data.json';
    a.click(); URL.revokeObjectURL(a.href);
    toast('Your data has been downloaded.');
  };
  node.querySelector('#psDelete').onclick = async () => {
    if (!confirm('This will delete the case data stored on this device. This cannot be undone. Continue?')) return;
    await window.Privacy.deleteAllLocal();
    toast('Local data deleted.');
    Modal.close();
    location.reload();
  };

  node.querySelector('#psClose').onclick = Modal.close;

  // A5 — appearance / dark-mode toggle
  const themeWrap = node.querySelector('#themeToggle');
  const paintTheme = () => themeWrap.querySelectorAll('button').forEach(b =>
    b.classList.toggle('on', b.dataset.theme === currentTheme()));
  paintTheme();
  themeWrap.querySelectorAll('button').forEach(b => b.onclick = () => {
    applyTheme(b.dataset.theme); paintTheme();
  });

  Modal.open(node);
  renderConsent();
}

/* ============================================================
   PREPARE TAB — Grievance & CCMA preparation toolkit
   Practical, plain-language guidance + email generators for the
   two moments that matter most: the internal grievance, and the
   CCMA. Content is educational (not legal advice) and points to a
   human attorney for anything complex.
   ============================================================ */
function tabPrepare(body, c) {
  const wrap = el(`<div class="tabview on"></div>`);

  // expandable guidance block helper
  const acc = (items) => items.map((it, i) => `
    <div class="prep-acc">
      <button class="prep-acc-head" aria-expanded="false">
        <span>${esc(it.q)}</span><span class="prep-acc-caret">${ICONS.arrow}</span>
      </button>
      <div class="prep-acc-body" hidden>${it.a}</div>
    </div>`).join('');

  const doDont = (dos, donts) => `
    <div class="prep-dd">
      <div class="prep-dd-col do">
        <h5>${ICONS.check} Do</h5>
        <ul>${dos.map(d => `<li>${esc(d)}</li>`).join('')}</ul>
      </div>
      <div class="prep-dd-col dont">
        <h5>${ICONS.x} Don\u2019t</h5>
        <ul>${donts.map(d => `<li>${esc(d)}</li>`).join('')}</ul>
      </div>
    </div>`;

  wrap.innerHTML = `
    <div class="prep-intro">
      <h2>Grievance &amp; CCMA toolkit</h2>
      <p>Practical, step-by-step preparation for the two moments that decide most cases: your internal <strong>grievance</strong>, and the <strong>CCMA</strong>. Plain language, what to say, what to avoid, and email drafts you can use.</p>
      <div class="prep-disclaimer">${ICONS.shield} This is preparation guidance, not legal advice. For anything complex \u2014 dismissal, discrimination, or the Labour Court \u2014 use the Help tab to reach a real attorney.</div>
    </div>

    <div class="prep-switch" role="tablist">
      <button class="prep-tab on" data-p="viability" role="tab">\ud83d\udd0d Should I Proceed?</button>
      <button class="prep-tab" data-p="grievance" role="tab">${ICONS.note} Grievance</button>
      <button class="prep-tab" data-p="ccma" role="tab">${ICONS.scale} CCMA</button>
      <button class="prep-tab" data-p="union" role="tab">\u270a Union Rights</button>
    </div>

    <div id="prepPanel"></div>`;

  body.appendChild(wrap);

  const panel = wrap.querySelector('#prepPanel');

  function wireAcc(scope) {
    scope.querySelectorAll('.prep-acc-head').forEach(h => h.onclick = () => {
      const b = h.nextElementSibling;
      const open = !b.hidden;
      b.hidden = open; h.setAttribute('aria-expanded', String(!open));
      h.classList.toggle('open', !open);
    });
  }

  /* ---------- GRIEVANCE PANEL ---------- */
  function renderGrievance() {
    panel.innerHTML = `
      <section class="prep-sec">
        <h3>${ICONS.spark} What a grievance is \u2014 and why it matters</h3>
        <p class="prep-lead">A grievance is your formal, written complaint to your employer <em>before</em> things escalate. Done well, it builds your record, forces a response, and can resolve the issue without the CCMA. Done badly, it can hand your employer a defence. This is where you quietly win or lose later.</p>
      </section>

      <section class="prep-sec">
        <h3>${ICONS.list} Everything to do before you lodge</h3>
        ${acc([
          { q: 'Get your facts and dates straight first', a: '<p>Write a simple timeline: what happened, when, who was there, and what was said. Vague complaints get dismissed. Specific, dated facts get taken seriously. Use the <strong>Timeline</strong> tab to build this.</p>' },
          { q: 'Gather your evidence quietly', a: '<p>Save emails, WhatsApps, payslips, your contract, and any policy that was breached \u2014 <em>before</em> you complain, in case access is cut. Upload them in the <strong>Documents</strong> tab. Never delete anything, even things that look bad.</p>' },
          { q: 'Read your employer\u2019s grievance policy', a: '<p>Most workplaces have a grievance procedure (often in the contract or handbook). Follow it exactly \u2014 to whom, in what form, and in what timeframe. Following their own process removes their easiest defence.</p>' },
          { q: 'Decide what outcome you actually want', a: '<p>Be clear: an apology, a reversal, back-pay, a transfer, a stop to the behaviour? A grievance with a clear ask is far stronger than a general complaint. Set this in your case so the AI can help frame it.</p>' },
        ])}
      </section>

      <section class="prep-sec">
        <h3>${ICONS.check} What to say \u2014 and what not to</h3>
        ${doDont(
          ['Stick to facts, dates, and what was said or done', 'Reference the specific policy or contract term breached', 'State the outcome you want, clearly', 'Keep a calm, professional tone throughout', 'Keep copies of everything you send and receive', 'Put it in writing, even if you also raise it verbally'],
          ['Don\u2019t exaggerate, guess, or add things you can\u2019t prove', 'Don\u2019t insult, threaten, or make it personal', 'Don\u2019t resign in anger before getting advice', 'Don\u2019t lie or hide facts \u2014 it destroys your credibility', 'Don\u2019t delay past your policy\u2019s time limit', 'Don\u2019t sign anything you don\u2019t understand']
        )}
      </section>

      <section class="prep-sec">
        <h3>${ICONS.mail} Grievance email generator</h3>
        <p class="prep-lead">Generate a professional grievance email from your case details. Always read it, edit it, and check the facts before sending.</p>
        <button class="btn btn-primary" id="prepGrievEmail">${ICONS.mail} Generate my grievance email</button>
      </section>

      <section class="prep-sec">
        <h3>${ICONS.clock} What to do after the grievance hearing</h3>
        ${acc([
          { q: 'Get the outcome in writing', a: '<p>Ask for the decision and reasons in writing. If they only tell you verbally, send a polite email summarising what you were told and asking them to confirm \u2014 this creates a record.</p>' },
          { q: 'If you win: confirm and follow up', a: '<p>Make sure the agreed action actually happens. Diarise it. If they don\u2019t follow through, that itself becomes new evidence.</p>' },
          { q: 'If you lose: check for an internal appeal', a: '<p>Most procedures allow an appeal within a set number of days. Use it \u2014 it shows you exhausted internal remedies, which strengthens any later CCMA referral.</p>' },
          { q: 'Watch the CCMA clock', a: '<p>If the issue is dismissal or an unfair labour practice and it isn\u2019t resolved, strict CCMA deadlines apply (often 30 or 90 days). Check your <strong>Home</strong> tab \u2014 the deadline clock is running.</p>' },
        ])}
      </section>`;
    wireAcc(panel);
    const eb = panel.querySelector('#prepGrievEmail');
    if (eb) eb.onclick = () => generatePrepEmail(c, 'grievance');
  }

  /* ---------- CCMA PANEL ---------- */
  function renderCCMA() {
    panel.innerHTML = `
      <section class="prep-sec">
        <h3>${ICONS.scale} How the CCMA works (in plain language)</h3>
        <p class="prep-lead">The CCMA is a free, informal dispute-resolution body. Most matters go to <strong>conciliation</strong> first (an attempt to settle), and if that fails, to <strong>arbitration</strong> (a commissioner hears both sides and decides). You don\u2019t need a lawyer, but you do need to be prepared.</p>
      </section>

      <section class="prep-sec">
        <h3>${ICONS.clock} How to log (refer) a case with the CCMA</h3>
        ${acc([
          { q: 'Check you\u2019re in time', a: '<p>Unfair dismissal: refer within <strong>30 days</strong>. Unfair labour practice: <strong>90 days</strong>. Discrimination: <strong>6 months</strong>. Late? You can ask for condonation, but it\u2019s not guaranteed. Your <strong>Home</strong> tab tracks this.</p>' },
          { q: 'Complete the LRA 7.11 referral form', a: '<p>This is the form that starts your case. Use the <strong>AI Actions \u2192 CCMA forms</strong> tool to pre-fill it from your case details. State the dispute type and what you want clearly.</p>' },
          { q: 'Serve it on your employer and keep proof', a: '<p>You must give a copy to your employer and prove you did (email read-receipt, registered post slip, or signed acknowledgement). No proof of service = a jurisdiction attack on day one.</p>' },
          { q: 'Wait for the set-down notice', a: '<p>The CCMA will notify you of the date and venue. Diarise it. Missing it can end your case.</p>' },
        ])}
      </section>

      <section class="prep-sec">
        <h3>${ICONS.doc} What to put in your case (and what to leave out)</h3>
        ${doDont(
          ['A clear, dated account of what happened', 'Your strongest documents, organised (use Evidence \u2192 bundle)', 'The specific right or term that was breached', 'A realistic remedy and how you calculated it', 'Witnesses who actually saw or heard the events'],
          ['Don\u2019t dump every document \u2014 lead with the strongest', 'Don\u2019t include hearsay or unverified screenshots as your main proof', 'Don\u2019t overclaim the remedy \u2014 it damages credibility', 'Don\u2019t bring irrelevant personal grievances', 'Don\u2019t rely on memory alone \u2014 back it with documents']
        )}
      </section>

      <section class="prep-sec">
        <h3>${ICONS.spark} How to use evidence (and how not to)</h3>
        ${acc([
          { q: 'Organise it so it tells the story', a: '<p>A commissioner should grasp your case from the first few documents. Use <strong>AI Actions \u2192 Organise evidence bundle</strong> to sort, number, and index everything.</p>' },
          { q: 'Authenticate it', a: '<p>For screenshots and messages, be ready to say where they came from and when. The employer\u2019s own emails are your strongest evidence \u2014 they\u2019re admissions, not hearsay.</p>' },
          { q: 'Don\u2019t ambush or fabricate', a: '<p>Never alter a document or invent a date. One fabrication destroys your whole case. Disclose your bundle properly.</p>' },
        ])}
      </section>

      <section class="prep-sec">
        <h3>${ICONS.chat} What to say at the CCMA \u2014 and what not to</h3>
        ${doDont(
          ['Answer the question asked, calmly and briefly', 'Refer to your bundle by page/number', 'Stick to facts you can prove', 'Admit what you genuinely don\u2019t know', 'Let the documents carry the emotion'],
          ['Don\u2019t argue, interrupt, or get personal', 'Don\u2019t guess or exaggerate under pressure', 'Don\u2019t volunteer weaknesses you weren\u2019t asked about', 'Don\u2019t lose your temper \u2014 it\u2019s used against you', 'Don\u2019t accept a bad settlement out of fear']
        )}
      </section>

      <section class="prep-sec">
        <h3>${ICONS.shield} Practice a mock CCMA cross-examination</h3>
        <p class="prep-lead">The best preparation is rehearsing tough questions in private, at your own pace. The mock drill simulates an employer\u2019s representative questioning you.</p>
        <button class="btn btn-primary" id="prepMock">${ICONS.shield} Start mock CCMA practice</button>
      </section>

      <section class="prep-sec">
        <h3>${ICONS.spark} See your case through the employer\u2019s eyes</h3>
        <p class="prep-lead">Know every attack before the day. The employer-attack analysis shows their likely arguments and your answer to each.</p>
        <button class="btn btn-ghost" id="prepAttack">${ICONS.scale} Run employer attack analysis</button>
      </section>`;
    wireAcc(panel);
    const mb = panel.querySelector('#prepMock');
    if (mb) mb.onclick = () => { if (typeof openCrossExam === 'function') openCrossExam(c); else { State.tab = 'actions'; render(); } };
    const ab = panel.querySelector('#prepAttack');
    if (ab) ab.onclick = () => { if (typeof openEmployerAttack === 'function') openEmployerAttack(c); else { State.tab = 'actions'; render(); } };
  }

  // switch tabs
  wrap.querySelectorAll('.prep-tab').forEach(b => b.onclick = () => {
    wrap.querySelectorAll('.prep-tab').forEach(x => x.classList.remove('on'));
    b.classList.add('on');
    const p = b.dataset.p;
    if (p === 'ccma') renderCCMA();
    else if (p === 'grievance') renderGrievance();
    else if (p === 'union') renderUnion();
    else renderViability();
  });

  renderViability();
}

/* generate a grievance/manager email via the AI (falls back to a template) */
async function generatePrepEmail(c, kind) {
  toast('Drafting your email\u2026', 'mic');
  const prompt = kind === 'grievance'
    ? 'Write a professional, calm formal grievance email to my employer based on my case. Include: a clear subject line, the specific issue with dates, the policy or contract term breached if known, and the outcome I am seeking. Keep it factual and non-emotional. End by requesting a written response within a reasonable time.'
    : 'Write a professional email to my manager raising my workplace concern calmly and factually, aiming to resolve it informally before any formal step.';
  let text = null;
  try {
    if (window.Backend && window.Backend.ai) {
      const turn = await window.Backend.ai(c, prompt);
      text = turn && turn.text;
    }
  } catch {}
  if (!text) {
    // offline template fallback
    text = `Subject: Formal Grievance \u2014 ${c.name || 'Workplace concern'}\n\nDear [Manager / HR],\n\nI am writing to formally raise a grievance regarding [briefly state the issue] which occurred on [date(s)].\n\nThe facts are as follows:\n- [What happened, with dates]\n- [Who was involved / present]\n- [The policy or contract term you believe was breached]\n\nThe outcome I am seeking is [state clearly what you want].\n\nI would appreciate a written response by [reasonable date]. I remain willing to resolve this matter constructively.\n\nYours sincerely,\n[Your name]`;
  }
  // show in a simple modal with copy
  const node = el(`<div class="modal modal-lg">

<script>
/* ===== backend-connector.js ===== */
/* ============================================================
   MyLabourRights — Backend Connector
   Bridges the frontend to the Netlify functions.
   KEY DESIGN: if the backend is missing, not configured, or
   offline, every call FALLS BACK to the built-in simulation so
   the app never breaks. You can deploy with zero keys and it
   still works — add keys later to switch features on.

   Load this AFTER the main app script.
   ============================================================ */

const Backend = (() => {
  const BASE = '/.netlify/functions';
  let aiLive = null;   // null = unknown, true/false once detected

  async function post(fn, payload) {
    const res = await fetch(`${BASE}/${fn}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
    });
    return res.json();
  }

  /* ---- AI: try real dual-AI, fall back to CaseEngine simulation ---- */
  async function ai(caseObj, userText) {
    // build history from stored messages
    let history = [];
    try {
      const msgs = await window.MyLabourRightsDB.byIndex('messages', 'caseId', caseObj.id);
      history = msgs.sort((a, b) => a.ts - b.ts)
        .slice(-12)
        .map(m => ({ role: m.role === 'ai' ? 'ai' : 'me', text: m.text }));
    } catch { /* ignore */ }

    const cfg = window.CASE_TYPES[caseObj.caseType] || {};
    // G4 — compact, non-identifying case context so the live model's answers
    // match the deadline clock and strength tools. No names / ID numbers.
    let caseContext = null;
    try {
      const dl = (caseObj.disputeKey && caseObj.incidentDate && window.Deadline)
        ? window.Deadline.compute(caseObj.disputeKey, caseObj.incidentDate) : null;
      caseContext = {
        disputeKey: caseObj.disputeKey || null,
        deadlineStatus: dl ? dl.status : null,
        daysToDeadline: dl ? dl.daysLeft : null,
        desiredOutcome: caseObj.desiredOutcome || null,
        docCount: caseObj.docCount || 0,
        strength: (caseObj._strength && caseObj._strength.score) || null,
      };
    } catch {}
    try {
      const data = await post('ai', {
        persona: window.CaseEngine.persona(),
        caseType: caseObj.caseType,
        ccmaValidity: !!cfg.ccmaValidity,
        caseContext,
        history,
        userText,
      });
      if (data && data.error === 'rate_limited') {
        // graceful: tell the user to slow down, don't fall to simulation
        return {
          kind: 'opinion', offTopic: false,
          text: data.message || 'You\u2019re sending messages very quickly \u2014 please wait a moment and try again.',
          followUp: null, evidence: [], successRate: null, validity: null,
        };
      }
      if (data && !data.fallback && data.text) {
        aiLive = true;
        // shape into the same aiTurn the UI expects (carry routing metadata)
        return {
          kind: data.followUp ? 'opinion' : 'opinion',
          offTopic: false,
          text: data.text,
          followUp: data.followUp || null,
          evidence: data.evidence || [],
          successRate: data.successRate ?? null,
          validity: data.validity || null,
          provider: data.provider || null,
          tier: data.tier || null,
          // S14: run escalation detection client-side on the user's text
          escalate: (window.CaseEngine.detectEscalation
            ? window.CaseEngine.detectEscalation(userText, caseObj) : null),
        };
      }
    } catch { /* network/offline — fall through */ }

    // FALLBACK — built-in simulation
    aiLive = false;
    return window.CaseEngine.respond(caseObj, userText);
  }

  /* ---- Payment: try PayFast, fall back to instant mock unlock ---- */
  async function pay(caseObj) {
    const cfg = window.CASE_TYPES[caseObj.caseType] || {};
    try {
      const data = await post('pay', {
        caseId: caseObj.id,
        caseType: caseObj.caseType,
        amount: cfg.price,
        returnUrl: location.origin + location.pathname + '?paid=1',
      });
      if (data && data.redirectUrl) {
        // real PayFast — redirect the user
        return { mode: 'redirect', url: data.redirectUrl };
      }
    } catch { /* fall through */ }
    // FALLBACK — simulated payment
    return { mode: 'simulated' };
  }

  /* ---- Blog draft / publish (used by admin panel) ---- */
  async function blogDraft(topic) { return post('blog', { action: 'draft', topic }); }
  async function blogPublish(post, siteUrl) {
    return post('blog', { action: 'publish', post, siteUrl });
  }

  function status() { return { aiLive }; }

  return { ai, pay, blogDraft, blogPublish, status };
})();

window.Backend = Backend;

/* ── Citation chip parser ─────────────────────────────────────────
   Call on every AI response text. Converts <cite law="...">...</cite>
   tags into tappable interactive chips.                           */
function parseCitations(text) {
  if (!text) return text;
  return text.replace(/<cite law="([^"]+)">([^<]+)<\/cite>/g, (_, law, desc) => {
    const l = law.replace(/'/g, '&#39;');
    const d = desc.replace(/'/g, '&#39;');
    return `<button class="cite-chip" onclick="MLR.showCitation('${l}','${d}')" aria-label="Legal citation: ${l}. Tap to expand." type="button">\u2696 ${law}</button>`;
  });
}

    const data  = {

      cases, docs, msgs,

      inp.onchange = (e) => MLR.handleImport(e);
      document.body.appendChild(inp);
    }
    inp.click();
  },

  async handleImport(event) {
    const file = event.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = async (e) => {
      try {
        const data = JSON.parse(e.target.result);
        if (data.version !== 1) throw new Error('Unknown version');
        if (!confirm('Import case data from ' + file.name + '? This will merge with your existing data.')) return;
        for (const c of (data.cases || [])) await DB.put('cases', c);
        for (const d of (data.docs  || [])) await DB.put('documents', d).catch(() => {});
        for (const m of (data.msgs  || [])) await DB.put('messages', m).catch(() => {});
        toast('Case imported successfully.');

      } catch(err) {
        toast('Could not read this file. Please use a MyLabourRights export file.', 'alert');

/* ── Deadline chip helper — renders a chip anywhere ──────────────── */
function renderDeadlineChip(c) {
  if (!c || !c.disputeKey || !c.incidentDate || !window.Deadline) return null;
  const d = window.Deadline.compute(c.disputeKey, c.incidentDate);
  if (!d) return null;
  const state = d.status === 'missed' ? 'filed'
    : d.daysLeft <= 7 ? 'urgent' : d.daysLeft <= 20 ? 'warning' : 'safe';
  const chip = document.createElement('div');
  chip.className = 'dcb' + (state === 'urgent' ? ' dcb-pulse' : '');
  chip.setAttribute('data-state', state);
  chip.setAttribute('role', 'status');
  chip.setAttribute('aria-label', `Deadline: ${d.status === 'missed' ? 'passed' : d.daysLeft + ' days remaining'}`);
  // Ring SVG
  const circ = 2 * Math.PI * 45;
  const pct  = d.status === 'missed' ? 0 : Math.max(0, Math.min(1, d.daysLeft / (d.windowDays || 30)));
  const offs = circ * (1 - pct);
  const strokeC = state === 'urgent' ? 'var(--danger)' : state === 'warning' ? 'var(--warning)' : 'var(--success)';
  chip.innerHTML = `
    <div class="dlr-wrap" aria-hidden="true">
      <svg class="dlr-svg" width="110" height="110" viewBox="0 0 110 110">
        <circle class="dlr-track" cx="55" cy="55" r="45"/>
        <circle class="dlr-fill" cx="55" cy="55" r="45" stroke="${strokeC}"
          stroke-dasharray="${circ.toFixed(2)}" stroke-dashoffset="${offs.toFixed(2)}"/>
      </svg>
      <div class="dlr-inner">
        <div class="dlr-num" style="color:${strokeC}">${d.status === 'missed' ? '!' : d.daysLeft}</div>
        <div class="dlr-lbl">${d.status === 'missed' ? 'PASSED' : 'DAYS'}</div>
      </div>
    </div>
    <div>
      <div class="dcb-label">${d.status === 'missed' ? 'Deadline passed' : t('deadline_days') || 'Days to file'}</div>
      <div class="dcb-sub">${
        d.status === 'missed' ? 'Apply for condonation \u2014 Lee can help draft your explanation.' :
        d.daysLeft <= 7 ? 'Urgent \u2014 file at the CCMA as soon as possible.' :
        'File at the CCMA within ' + d.daysLeft + ' days of your dismissal.'
      }</div>
    </div>`;
  return chip;
}

  wireAcc(panel);
}

/* ── Patch tabPrepare to inject the new render functions ────────── */
const _origTabPrepare = tabPrepare;
tabPrepare = function(body, c) {
  _origTabPrepare(body, c);
  // Replace the render functions in the scope of the rendered panel
  // by hooking into the already-rendered DOM
  const prepBody = body.querySelector('#prepPanel');
  const wrap     = body.querySelector('.tabview');
  if (!prepBody || !wrap) return;

  // We need access to wireAcc and doDont from the original tabPrepare closure.
  // Since they are inner functions, we re-declare minimal versions here.
  function wireAcc2(scope) {
    scope.querySelectorAll('.prep-acc-head').forEach(h => h.onclick = () => {
      const b = h.nextElementSibling;
      const open = !b.hidden;
      b.hidden = open;
      h.setAttribute('aria-expanded', String(!open));
      h.classList.toggle('open', !open);
    });
  }

  function acc2(items) {
    return items.map(it => `
      <div class="prep-acc">
        <button class="prep-acc-head" aria-expanded="false">
          <span>${esc(it.q)}</span><span class="prep-acc-caret">${ICONS.arrow}</span>
        </button>
        <div class="prep-acc-body" hidden>${it.a}</div>
      </div>`).join('');
  }

  // Override click handlers on the tabs we added
  wrap.querySelectorAll('.prep-tab').forEach(b => {
    b.onclick = () => {
      wrap.querySelectorAll('.prep-tab').forEach(x => x.classList.remove('on'));
      b.classList.add('on');
      const p = b.dataset.p;
      const panel = wrap.querySelector('#prepPanel');
      if (!panel) return;
      if (p === 'viability') renderViabilityInPrepPanel(panel, c, wireAcc2, null);
      else if (p === 'union') renderUnionInPrepPanel(panel, c, acc2, wireAcc2);
      else if (p === 'ccma') {
        // Re-call original CCMA render from the original tabPrepare logic
        // Since we can't access the inner function, we trigger a re-render
        // by briefly invoking the original tabPrepare approach
        panel.innerHTML = `<div style="padding:20px;text-align:center;color:var(--text-mute)">
          <p>Loading CCMA guide\u2026</p>
          <button class="btn btn-primary mt12" onclick="State.tab='prepare';render()">Reload</button>
          <p style="font-size:12px;margin-top:8px">Tip: Select the CCMA tab after the page reloads for the full CCMA guide.</p>
        </div>`;
        // Immediately switch state and re-render to get original tabs
        setTimeout(() => {
          State.tab = 'prepare';
          render();
          // After render, click the CCMA tab
          setTimeout(() => {
            document.querySelector('.prep-tab[data-p="ccma"]')?.click();
          }, 100);
        }, 50);
      } else {
        panel.innerHTML = `<div style="padding:20px;text-align:center;color:var(--text-mute)">Loading\u2026</div>`;
        setTimeout(() => { State.tab = 'prepare'; render(); }, 50);
      }
    };
  });

  // Default: show viability check
  renderViabilityInPrepPanel(prepBody, c, wireAcc2, null);
};



</script>
